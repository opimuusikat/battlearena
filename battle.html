function drawHazards(now){
  hazards.forEach(h=>{
    const wa=!h.active?0.4+0.3*Math.sin(now*0.01):1;
    ctx.save();
    switch(h.theme){
      case 0:{// DUNGEON spike trap
        const glow=h.active?'#FF2200':'#FF8800';
        ctx.globalAlpha=wa*0.35;ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r+6,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=wa;ctx.strokeStyle=glow;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r,0,Math.PI*2);ctx.stroke();
        // X cross
        ctx.lineWidth=1.5;
        [[-1,-1],[1,-1]].forEach(([sx,sy])=>{
          ctx.beginPath();ctx.moveTo(~~h.x+sx*h.r*0.55,~~h.y+sy*h.r*0.55);ctx.lineTo(~~h.x-sx*h.r*0.55,~~h.y-sy*h.r*0.55);ctx.stroke();
        });
        break;}
      case 1:{// VOLCANO lava eruption
        const r=h.r||4;
        const gr=ctx.createRadialGradient(~~h.x,~~h.y,0,~~h.x,~~h.y,r);
        gr.addColorStop(0,'rgba(255,200,0,'+wa*0.9+')');
        gr.addColorStop(0.6,'rgba(255,80,0,'+wa*0.7+')');
        gr.addColorStop(1,'rgba(180,20,0,0)');
        ctx.fillStyle=gr;ctx.beginPath();ctx.arc(~~h.x,~~h.y,r,0,Math.PI*2);ctx.fill();
        if(!h.active){ctx.strokeStyle='#FFDD00';ctx.lineWidth=2;ctx.globalAlpha=wa;ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.maxR,0,Math.PI*2);ctx.stroke();}
        break;}
      case 2:{// CYBER laser
        const lp=~~h.pos;
        ctx.globalAlpha=h.active?0.85:0.3;
        ctx.shadowBlur=h.active?14:0;ctx.shadowColor=h.col;
        ctx.strokeStyle=h.col;ctx.lineWidth=h.active?3:1.5;
        ctx.setLineDash(h.active?[]:[6,6]);
        ctx.beginPath();
        if(h.axis==='h'){ctx.moveTo(AX,lp);ctx.lineTo(AX+AW,lp);}
        else{ctx.moveTo(lp,AY);ctx.lineTo(lp,AY+AH);}
        ctx.stroke();
        ctx.setLineDash([]);ctx.shadowBlur=0;
        break;}
      case 3:{// COSMOS gravity well
        const pulse=0.5+0.5*Math.sin(now*0.004);
        ctx.globalAlpha=0.18+0.12*pulse;ctx.fillStyle='#220044';
        ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=0.55+0.3*pulse;ctx.strokeStyle='#8844CC';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r,0,Math.PI*2);ctx.stroke();
        // Inward arcs
        ctx.globalAlpha=0.4;ctx.lineWidth=1;ctx.strokeStyle='#BB66FF';
        for(let _ai=0;_ai<6;_ai++){
          const _a=_ai/6*Math.PI*2+(now*0.001);
          ctx.beginPath();ctx.moveTo(~~(h.x+Math.cos(_a)*h.r),~~(h.y+Math.sin(_a)*h.r));
          ctx.lineTo(~~(h.x+Math.cos(_a)*h.r*0.4),~~(h.y+Math.sin(_a)*h.r*0.4));ctx.stroke();
        }
        break;}
      case 4:{// DOJO wall crush
        const d=h.depth;
        ctx.globalAlpha=h.active?0.55:0.2;ctx.fillStyle=h.col;
        if(h.edge===0)ctx.fillRect(AX,AY,AW,d);
        else if(h.edge===1)ctx.fillRect(AX+AW-d,AY,d,AH);
        else if(h.edge===2)ctx.fillRect(AX,AY+AH-d,AW,d);
        else ctx.fillRect(AX,AY,d,AH);
        ctx.globalAlpha=h.active?0.9:0.45;ctx.strokeStyle='#CC9955';ctx.lineWidth=2;
        ctx.strokeRect(AX+(h.edge===3?d:0)-0.5,AY+(h.edge===0?d:0)-0.5,
          AW-(h.edge===1||h.edge===3?d:0)+1,AH-(h.edge===0||h.edge===2?d:0)+1);
        break;}
      case 5:{// ICE frost zone
        const fp=0.5+0.5*Math.sin(now*0.005);
        const fg=ctx.createRadialGradient(~~h.x,~~h.y,0,~~h.x,~~h.y,h.r);
        fg.addColorStop(0,`rgba(100,200,255,${wa*(h.active?0.22:0.1)})`);
        fg.addColorStop(0.7,`rgba(60,140,220,${wa*(h.active?0.12:0.05)})`);
        fg.addColorStop(1,'rgba(30,80,180,0)');
        ctx.fillStyle=fg;ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=h.active?12:0;ctx.shadowColor='#66CCFF';
        ctx.strokeStyle=h.active?`rgba(100,210,255,${0.6+0.3*fp})`:'rgba(80,160,220,0.35)';
        ctx.lineWidth=h.active?2:1;ctx.setLineDash(h.active?[]:[4,4]);
        ctx.beginPath();ctx.arc(~~h.x,~~h.y,h.r,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);ctx.shadowBlur=0;
        // snowflake icon center
        if(h.active){
          ctx.globalAlpha=0.5+0.3*fp;ctx.strokeStyle='#AADDFF';ctx.lineWidth=1.5;
          for(let _k=0;_k<3;_k++){const _a=_k/3*Math.PI;
            ctx.beginPath();ctx.moveTo(~~h.x+Math.cos(_a)*10,~~h.y+Math.sin(_a)*10);
            ctx.lineTo(~~h.x-Math.cos(_a)*10,~~h.y-Math.sin(_a)*10);ctx.stroke();
          }
        }
        break;}
    }
    ctx.restore();
  });
}

function drawPerkDraft(){
  // Layout constants — 2-column grid, 4 rows max each side, fits up to 8 fighters
  const _colW=390,_gap=4,_cardW=~~((_colW-2*_gap)/3),_cardH=54,_labelH=14,_rowH=_labelH+_cardH+6;
  const _col0x=8,_col1x=402,_startY=46;
  const allChosen=perkSelections.every(s=>s!==null);

  // Background
  ctx.fillStyle='#050009';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.fillStyle='rgba(0,0,0,0.04)';for(let _y=0;_y<660;_y+=4)ctx.fillRect(0,_y,800,1);

  // Title
  ctx.font='bold 16px "Courier New",monospace';ctx.fillStyle='#CC88FF';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='#CC88FF';ctx.shadowBlur=10;
  ctx.fillText('\u2605 PERK DRAFT \u2605',400,10);ctx.shadowBlur=0;
  ctx.font='9px "Courier New",monospace';ctx.fillStyle='#554466';
  ctx.fillText('Click a perk for each fighter \u2014 auto-picks in 9s',400,30);

  // Divider line between columns
  ctx.strokeStyle='#1a0a2a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(400,42);ctx.lineTo(400,630);ctx.stroke();

  perkChoices.forEach((choices,fi)=>{
    const def=selected[fi];
    const col=fi%2,row=~~(fi/2);
    const colX=col===0?_col0x:_col1x;
    const rowY=_startY+row*_rowH;
    const sel=perkSelections[fi];

    // Fighter label
    ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle=def.col;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('\u25b8 '+def.name,colX+2,rowY);
    if(sel!==null){
      ctx.font='9px "Courier New",monospace';ctx.fillStyle='#44FF88';
      ctx.textAlign='right';ctx.fillText('\u2713 '+choices[sel].name,colX+_colW-2,rowY);
    }

    // 3 perk cards
    choices.forEach((pk,pi)=>{
      const cx=colX+pi*(_cardW+_gap),cy=rowY+_labelH;
      const isSel=sel===pi;
      ctx.fillStyle=isSel?pk.col+'30':'#0c000e';
      ctx.strokeStyle=isSel?pk.col:'#221133';
      ctx.lineWidth=isSel?1.5:1;
      ctx.shadowBlur=isSel?8:0;ctx.shadowColor=pk.col;
      ctx.fillRect(cx,cy,_cardW,_cardH);ctx.strokeRect(cx+0.5,cy+0.5,_cardW-1,_cardH-1);
      ctx.shadowBlur=0;
      ctx.fillStyle=pk.col+(isSel?'88':'33');ctx.fillRect(cx,cy,_cardW,3);
      ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle=isSel?pk.col:'#AAAACC';
      ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(pk.name,cx+5,cy+7);
      ctx.font='8px "Courier New",monospace';ctx.fillStyle='#776688';
      // Word-wrap desc into 2 lines max
      const words=pk.desc.split(' ');let line1='',line2='';
      words.forEach(w=>{if(ctx.measureText(line1+' '+w).width<_cardW-10)line1+=(line1?' ':'')+w;else line2+=(line2?' ':'')+w;});
      ctx.fillText(line1,cx+5,cy+22);
      if(line2)ctx.fillText(line2,cx+5,cy+33);
      if(isSel){ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=pk.col;ctx.textAlign='right';ctx.fillText('\u2713',cx+_cardW-4,cy+4);}
    });
  });

  // Progress bar
  const prog=Math.min(perkDraftTimer/9000,1);
  ctx.fillStyle='#0e001a';ctx.fillRect(150,638,500,7);
  ctx.fillStyle=allChosen?'#44FF88':'#773399';ctx.fillRect(150,638,~~(500*prog),7);
  ctx.strokeStyle='#221133';ctx.lineWidth=1;ctx.strokeRect(150,638,500,7);
  ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle=allChosen?'#44FF88':'#443355';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(allChosen?'ALL CHOSEN \u2014 STARTING...':'CLICK A PERK FOR EACH FIGHTER',400,650);
}

function drawBracket(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.font='bold 20px "Courier New",monospace';ctx.fillStyle='#FFF';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TOURNAMENT BRACKET',400,14);
  if(!tournament)return;
  const {fighters:tf,matches,matchIdx,champion}=tournament;
  if(champion){
    const def=DEFS.find(d=>d.id===champion.id)||champion;
    ctx.font='bold 28px "Courier New",monospace';ctx.fillStyle=def.col||'#FFD700';
    ctx.fillText('\u2605 CHAMPION: '+def.name+' \u2605',400,44);
  }
  const _bh=26;
  if(tf.length===8){
    // 8-player left-right bracket: left(0-3) flows right, right(4-7) flows left, SF+Final in center
    const _lQFx=8,_lQFw=110,_lSFx=144,_lSFw=100;
    const _rQFx=682,_rQFw=110,_rSFx=556,_rSFw=100;
    const _chX=260,_chW=280; // Final/Champion box, center=400
    const _lJX=_lQFx+_lQFw+14; // =132, left bracket junction
    const _rJX=_rQFx-14; // =668, right bracket junction
    // Fighter y positions: [P0,P1, P2,P3] (mirrored on right side)
    const _pY=[130,162,290,322];
    const _qf0mid=(_pY[0]+_bh/2+_pY[1]+_bh/2)/2; // ~159
    const _qf1mid=(_pY[2]+_bh/2+_pY[3]+_bh/2)/2; // ~319
    const _sfMid=(_qf0mid+_qf1mid)/2; // ~239
    const _sfY=~~(_sfMid-_bh/2);
    const _chY=_sfY;

    // ── Connectors ──
    ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;
    // Left: single vertical spine with horizontal branches
    ctx.beginPath();
    ctx.moveTo(_lQFx+_lQFw,_pY[0]+_bh/2);ctx.lineTo(_lJX,_pY[0]+_bh/2);
    ctx.moveTo(_lQFx+_lQFw,_pY[1]+_bh/2);ctx.lineTo(_lJX,_pY[1]+_bh/2);
    ctx.moveTo(_lJX,_pY[0]+_bh/2);ctx.lineTo(_lJX,_pY[1]+_bh/2);
    ctx.moveTo(_lQFx+_lQFw,_pY[2]+_bh/2);ctx.lineTo(_lJX,_pY[2]+_bh/2);
    ctx.moveTo(_lQFx+_lQFw,_pY[3]+_bh/2);ctx.lineTo(_lJX,_pY[3]+_bh/2);
    ctx.moveTo(_lJX,_pY[2]+_bh/2);ctx.lineTo(_lJX,_pY[3]+_bh/2);
    ctx.moveTo(_lJX,_qf0mid);ctx.lineTo(_lJX,_qf1mid); // SF spine
    ctx.moveTo(_lJX,_sfMid);ctx.lineTo(_lSFx,_sfMid);  // to SF box
    ctx.stroke();
    // Right: mirrored
    ctx.beginPath();
    ctx.moveTo(_rQFx,_pY[0]+_bh/2);ctx.lineTo(_rJX,_pY[0]+_bh/2);
    ctx.moveTo(_rQFx,_pY[1]+_bh/2);ctx.lineTo(_rJX,_pY[1]+_bh/2);
    ctx.moveTo(_rJX,_pY[0]+_bh/2);ctx.lineTo(_rJX,_pY[1]+_bh/2);
    ctx.moveTo(_rQFx,_pY[2]+_bh/2);ctx.lineTo(_rJX,_pY[2]+_bh/2);
    ctx.moveTo(_rQFx,_pY[3]+_bh/2);ctx.lineTo(_rJX,_pY[3]+_bh/2);
    ctx.moveTo(_rJX,_pY[2]+_bh/2);ctx.lineTo(_rJX,_pY[3]+_bh/2);
    ctx.moveTo(_rJX,_qf0mid);ctx.lineTo(_rJX,_qf1mid);
    ctx.moveTo(_rJX,_sfMid);ctx.lineTo(_rSFx+_rSFw,_sfMid);
    ctx.stroke();
    // Champion connectors (horizontal lines between SF boxes and champion)
    ctx.beginPath();
    ctx.moveTo(_lSFx+_lSFw,_sfMid);ctx.lineTo(_chX,_sfMid);
    ctx.moveTo(_chX+_chW,_sfMid);ctx.lineTo(_rSFx,_sfMid);
    ctx.stroke();

    // ── Left QF seed boxes (fighters 0-3) ──
    [0,1,2,3].forEach((fi,pos)=>{
      const def=tf[fi];const qmi=~~(pos/2);const m=matches[qmi];
      const isWinner=m.winner===def.id,isLoser=m.winner!==null&&!isWinner;
      const by=_pY[pos];
      ctx.fillStyle=isLoser?'#0a0a0a':def.col+'22';
      ctx.strokeStyle=isWinner?def.col:isLoser?'#1a1a1a':'#333';ctx.lineWidth=isWinner?2:1;
      ctx.fillRect(_lQFx,by,_lQFw,_bh);ctx.strokeRect(_lQFx+0.5,by+0.5,_lQFw-1,_bh-1);
      ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle=isLoser?'#333':def.col;
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(def.name,_lQFx+6,by+_bh/2);
      if(isWinner){ctx.fillStyle='#FFD700';ctx.textAlign='right';ctx.fillText('\u2605',_lQFx+_lQFw-4,by+_bh/2);}
    });

    // ── Left SF box (SF match 4: QF0+QF1 winners) ──
    const _sf4=matches[4],_sf4win=_sf4.winner!==null?tf.find(f=>f.id===_sf4.winner):null;
    const _qf0win=matches[0].winner!==null?tf.find(f=>f.id===matches[0].winner):null;
    const _qf1win=matches[1].winner!==null?tf.find(f=>f.id===matches[1].winner):null;
    ctx.fillStyle=_sf4win?_sf4win.col+'22':'#0d0d0d';
    ctx.strokeStyle=_sf4win?_sf4win.col:(_qf0win&&_qf1win)?'#555':'#2a2a2a';ctx.lineWidth=_sf4win?1.5:1;
    ctx.fillRect(_lSFx,_sfY,_lSFw,_bh);ctx.strokeRect(_lSFx+0.5,_sfY+0.5,_lSFw-1,_bh-1);
    ctx.font='bold 9px "Courier New",monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    if(_sf4win){ctx.fillStyle=_sf4win.col;ctx.fillText('\u2605 '+_sf4win.name,_lSFx+6,_sfY+_bh/2);}
    else{ctx.fillStyle=(_qf0win&&_qf1win)?'#888':'#333';ctx.fillText((_qf0win&&_qf1win)?'SF \u25B6':'SF 1',_lSFx+6,_sfY+_bh/2);}

    // ── Champion/Final box ──
    const _mFin=matches[6],_finWin=_mFin.winner!==null?tf.find(f=>f.id===_mFin.winner):null;
    ctx.fillStyle=_finWin?_finWin.col+'33':'#080010';
    ctx.strokeStyle=_finWin?_finWin.col:'#664488';ctx.lineWidth=_finWin?2:1.5;
    ctx.fillRect(_chX,_chY,_chW,_bh);ctx.strokeRect(_chX+0.5,_chY+0.5,_chW-1,_bh-1);
    ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=_finWin?_finWin.col:'#886699';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(_finWin?('\u2605 '+_finWin.name+' \u2605'):'\u2666 FINAL \u2666',_chX+_chW/2,_chY+_bh/2);

    // ── Right SF box (SF match 5: QF2+QF3 winners) ──
    const _sf5=matches[5],_sf5win=_sf5.winner!==null?tf.find(f=>f.id===_sf5.winner):null;
    const _qf2win=matches[2].winner!==null?tf.find(f=>f.id===matches[2].winner):null;
    const _qf3win=matches[3].winner!==null?tf.find(f=>f.id===matches[3].winner):null;
    ctx.fillStyle=_sf5win?_sf5win.col+'22':'#0d0d0d';
    ctx.strokeStyle=_sf5win?_sf5win.col:(_qf2win&&_qf3win)?'#555':'#2a2a2a';ctx.lineWidth=_sf5win?1.5:1;
    ctx.fillRect(_rSFx,_sfY,_rSFw,_bh);ctx.strokeRect(_rSFx+0.5,_sfY+0.5,_rSFw-1,_bh-1);
    ctx.font='bold 9px "Courier New",monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    if(_sf5win){ctx.fillStyle=_sf5win.col;ctx.fillText('\u2605 '+_sf5win.name,_rSFx+6,_sfY+_bh/2);}
    else{ctx.fillStyle=(_qf2win&&_qf3win)?'#888':'#333';ctx.fillText((_qf2win&&_qf3win)?'SF \u25B6':'SF 2',_rSFx+6,_sfY+_bh/2);}

    // ── Right QF seed boxes (fighters 4-7) ──
    [4,5,6,7].forEach((fi,pos)=>{
      const def=tf[fi];const qmi=2+~~(pos/2);const m=matches[qmi];
      const isWinner=m.winner===def.id,isLoser=m.winner!==null&&!isWinner;
      const by=_pY[pos];
      ctx.fillStyle=isLoser?'#0a0a0a':def.col+'22';
      ctx.strokeStyle=isWinner?def.col:isLoser?'#1a1a1a':'#333';ctx.lineWidth=isWinner?2:1;
      ctx.fillRect(_rQFx,by,_rQFw,_bh);ctx.strokeRect(_rQFx+0.5,by+0.5,_rQFw-1,_bh-1);
      ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle=isLoser?'#333':def.col;
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(def.name,_rQFx+6,by+_bh/2);
      if(isWinner){ctx.fillStyle='#FFD700';ctx.textAlign='right';ctx.fillText('\u2605',_rQFx+_rQFw-4,by+_bh/2);}
    });

    // ── Round labels ──
    ctx.font='bold 8px "Courier New",monospace';ctx.fillStyle='#444';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('QUARTER-FINALS',_lQFx+_lQFw/2,110);
    ctx.fillText('SEMI',_lSFx+_lSFw/2,110);
    ctx.fillText('FINAL',_chX+_chW/2,110);
    ctx.fillText('SEMI',_rSFx+_rSFw/2,110);
    ctx.fillText('QUARTER-FINALS',_rQFx+_rQFw/2,110);

    // ── Button ──
    if(champion){
      ctx.fillStyle='#110000';ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.fillRect(280,590,240,28);ctx.strokeRect(280.5,590.5,239,27);
      ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('\u2605 TOURNAMENT OVER',400,597);
    }else{
      const canStart=matches[matchIdx]&&matches[matchIdx].aIdx!==null;
      ctx.fillStyle='#001100';ctx.strokeStyle=canStart?'#44FF44':'#333';ctx.lineWidth=1;ctx.fillRect(280,590,240,28);ctx.strokeRect(280.5,590.5,239,27);
      ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle=canStart?'#44FF44':'#444';ctx.textAlign='center';ctx.textBaseline='top';
      const _lbl=matchIdx<4?'QF '+(matchIdx+1):matchIdx<6?'SF '+(matchIdx-3):matchIdx===6?'FINAL':'?';
      ctx.fillText('[ START '+_lbl+' ]',400,597);
    }
  }else{
    // 4-player left-right bracket: left(0,1) → semi1, right(2,3) → semi2, final in center
    const _lx=60,_lw=130,_rx=610,_rw=130,_chX4=265,_chW4=270;
    const _pY4=[190,230]; // P0/P1 on left, P2/P3 on right (same y)
    const _lMid4=(_pY4[0]+_bh/2+_pY4[1]+_bh/2)/2; // midpoint ~223
    const _chY4=~~(_lMid4-_bh/2);
    const _lJX4=_lx+_lw+14; // left junction
    const _rJX4=_rx-14; // right junction

    // Connectors
    ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(_lx+_lw,_pY4[0]+_bh/2);ctx.lineTo(_lJX4,_pY4[0]+_bh/2);
    ctx.moveTo(_lx+_lw,_pY4[1]+_bh/2);ctx.lineTo(_lJX4,_pY4[1]+_bh/2);
    ctx.moveTo(_lJX4,_pY4[0]+_bh/2);ctx.lineTo(_lJX4,_pY4[1]+_bh/2);
    ctx.moveTo(_lJX4,_lMid4);ctx.lineTo(_chX4,_lMid4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(_rx,_pY4[0]+_bh/2);ctx.lineTo(_rJX4,_pY4[0]+_bh/2);
    ctx.moveTo(_rx,_pY4[1]+_bh/2);ctx.lineTo(_rJX4,_pY4[1]+_bh/2);
    ctx.moveTo(_rJX4,_pY4[0]+_bh/2);ctx.lineTo(_rJX4,_pY4[1]+_bh/2);
    ctx.moveTo(_rJX4,_lMid4);ctx.lineTo(_chX4+_chW4,_lMid4);
    ctx.stroke();

    // Left seed boxes (P0,P1 — match 0)
    [0,1].forEach((fi,pos)=>{
      const def=tf[fi];const m=matches[0];
      const isWinner=m.winner===def.id,isLoser=m.winner!==null&&!isWinner;
      const by=_pY4[pos];
      ctx.fillStyle=isLoser?'#111':def.col+'22';
      ctx.strokeStyle=isWinner?def.col:isLoser?'#222':'#444';ctx.lineWidth=isWinner?2:1;
      ctx.fillRect(_lx,by,_lw,_bh);ctx.strokeRect(_lx+0.5,by+0.5,_lw-1,_bh-1);
      ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=isLoser?'#333':def.col;
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(def.name,_lx+8,by+_bh/2);
      if(isWinner){ctx.fillStyle='#FFD700';ctx.textAlign='right';ctx.fillText('\u2605',_lx+_lw-6,by+_bh/2);}
    });

    // Final box (center)
    const mF=matches[2],wF=mF.winner!==null?tf.find(f=>f.id===mF.winner):null;
    ctx.fillStyle=wF?wF.col+'22':'#080010';
    ctx.strokeStyle=wF?wF.col:'#664488';ctx.lineWidth=wF?2.5:1.5;
    ctx.fillRect(_chX4,_chY4,_chW4,_bh);ctx.strokeRect(_chX4+0.5,_chY4+0.5,_chW4-1,_bh-1);
    ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=wF?wF.col:'#886699';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(wF?('\u2605 '+wF.name+' \u2605'):'\u2666 FINAL \u2666',_chX4+_chW4/2,_chY4+_bh/2);

    // Right seed boxes (P2,P3 — match 1)
    [2,3].forEach((fi,pos)=>{
      const def=tf[fi];const m=matches[1];
      const isWinner=m.winner===def.id,isLoser=m.winner!==null&&!isWinner;
      const by=_pY4[pos];
      ctx.fillStyle=isLoser?'#111':def.col+'22';
      ctx.strokeStyle=isWinner?def.col:isLoser?'#222':'#444';ctx.lineWidth=isWinner?2:1;
      ctx.fillRect(_rx,by,_rw,_bh);ctx.strokeRect(_rx+0.5,by+0.5,_rw-1,_bh-1);
      ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=isLoser?'#333':def.col;
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(def.name,_rx+8,by+_bh/2);
      if(isWinner){ctx.fillStyle='#FFD700';ctx.textAlign='right';ctx.fillText('\u2605',_rx+_rw-6,by+_bh/2);}
    });

    // Labels
    ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle='#555';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('SEMI',_lx+_lw/2,170);ctx.fillText('FINAL',_chX4+_chW4/2,170);ctx.fillText('SEMI',_rx+_rw/2,170);

    if(champion){
      ctx.fillStyle='#110000';ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.fillRect(280,590,240,28);ctx.strokeRect(280.5,590.5,239,27);
      ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('\u2605 TOURNAMENT OVER',400,597);
    }else if(matchIdx<=2){
      const canStart=matches[matchIdx]&&matches[matchIdx].aIdx!==null;
      ctx.fillStyle='#001100';ctx.strokeStyle=canStart?'#44FF44':'#333';ctx.lineWidth=1;ctx.fillRect(280,590,240,28);ctx.strokeRect(280.5,590.5,239,27);
      ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle=canStart?'#44FF44':'#444';ctx.textAlign='center';ctx.textBaseline='top';
      const lbl=matchIdx===2?'START FINAL':'START SEMI '+(matchIdx+1);
      ctx.fillText('[ '+lbl+' ]',400,597);
    }
  }
  ctx.fillStyle='#110000';ctx.strokeStyle='#FF4444';ctx.lineWidth=1;ctx.fillRect(560,590,100,28);ctx.strokeRect(560.5,590.5,99,27);
  ctx.font='bold 12px "Courier New",monospace';ctx.fillStyle='#FF4444';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('[ EXIT ]',610,597);
}

function drawBattle(now){
  ctx.textBaseline='top';
  drawArenaBackground(now);

  rings.forEach(rng=>{
    if(rng.r<=0)return;
    const _fa=1-rng.r/rng.maxR;
    const _r=Math.max(1,~~rng.r);
    const _cx=~~rng.x,_cy=~~rng.y;
    ctx.save();
    switch(rng.sub){
      case'divine':
        ctx.globalAlpha=_fa*0.18;ctx.fillStyle='#FFE060';ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa*0.85;ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=_fa*0.55;ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,210,50,0.7)';
        for(let _i=0;_i<8;_i++){const _a=_i/8*Math.PI*2;ctx.beginPath();ctx.moveTo(_cx+Math.cos(_a)*_r*0.75,_cy+Math.sin(_a)*_r*0.75);ctx.lineTo(_cx+Math.cos(_a)*(_r+10),_cy+Math.sin(_a)*(_r+10));ctx.stroke();}
        break;
      case'shockwave':
        ctx.globalAlpha=_fa*0.15;ctx.fillStyle=rng.col;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa*0.9;ctx.strokeStyle=rng.col;ctx.lineWidth=2;
        ctx.beginPath();for(let _i=0;_i<24;_i++){const _a=_i/24*Math.PI*2,_jr=_r+(_i%2===0?4:-4);ctx.lineTo(_cx+Math.cos(_a)*_jr,_cy+Math.sin(_a)*_jr);}
        ctx.closePath();ctx.stroke();
        ctx.globalAlpha=_fa*0.4;ctx.lineWidth=1;ctx.strokeStyle='#FFFFFF';ctx.beginPath();ctx.arc(_cx,_cy,_r*0.55,0,Math.PI*2);ctx.stroke();
        break;
      case'darkpulse':
        ctx.globalAlpha=_fa*0.45;ctx.fillStyle='#000000';ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa;ctx.strokeStyle='#7700CC';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=_fa*0.4;ctx.strokeStyle='#AA44FF';ctx.lineWidth=1;ctx.beginPath();ctx.arc(_cx,_cy,_r*0.55,0,Math.PI*2);ctx.stroke();
        break;
      case'drainwave':
        ctx.globalAlpha=_fa*0.22;ctx.fillStyle=rng.col;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa*0.85;ctx.strokeStyle=rng.col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=_fa*0.5;ctx.lineWidth=1.5;
        for(let _i=0;_i<10;_i++){const _a=_i/10*Math.PI*2;ctx.beginPath();ctx.moveTo(_cx+Math.cos(_a)*_r,_cy+Math.sin(_a)*_r);ctx.lineTo(_cx+Math.cos(_a+0.22)*_r*0.72,_cy+Math.sin(_a+0.22)*_r*0.72);ctx.stroke();}
        break;
      case'slowfield':
        ctx.globalAlpha=_fa*0.18;ctx.fillStyle='#88CCFF';ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa*0.9;ctx.strokeStyle='#AADDFF';ctx.lineWidth=2;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.stroke();
        [0.62,0.38].forEach(fr=>{ctx.globalAlpha=_fa*0.3;ctx.strokeStyle='#88BBFF';ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(_cx,_cy,~~(_r*fr),0,Math.PI*2);ctx.stroke();});
        ctx.globalAlpha=_fa*0.5;ctx.lineWidth=1.5;ctx.strokeStyle='#CCEEFF';
        for(let _i=0;_i<6;_i++){const _a=_i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(_cx+Math.cos(_a)*_r*0.85,_cy+Math.sin(_a)*_r*0.85);ctx.lineTo(_cx+Math.cos(_a)*(_r+6),_cy+Math.sin(_a)*(_r+6));ctx.stroke();}
        break;
      case'deathwave':
        ctx.globalAlpha=_fa*0.35;ctx.fillStyle='#440000';ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=_fa;ctx.strokeStyle='#CC0033';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(_cx,_cy,_r,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=_fa*0.4;ctx.lineWidth=1.5;ctx.strokeStyle='#FF2255';
        for(let _i=0;_i<7;_i++){const _a=_i/7*Math.PI*2;ctx.beginPath();ctx.moveTo(_cx+Math.cos(_a)*_r,_cy+Math.sin(_a)*_r);ctx.lineTo(_cx+Math.cos(_a)*(_r+12+(_i%2)*5),_cy+Math.sin(_a)*(_r+12+(_i%2)*5));ctx.stroke();}

    if(f.shield>0){ctx.fillStyle='rgba(100,180,255,0.85)';ctx.fillRect(_bx,_by-3,~~(Math.min(f.shield/50,1)*_bw),2);}
  });

  dmgNums.forEach(dn=>{
    const t=dn.age/dn.life;ctx.globalAlpha=1-t;ctx.font='bold 13px "Courier New", monospace';
    ctx.fillStyle=dn.col;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(dn.val,~~dn.x,~~(dn.y-t*30));
  });
  ctx.globalAlpha=1;

  // Hit vignette
  if(hitVignette&&state==='battle'){
    const _t=hitVignette.age/hitVignette.life,_a=(1-_t*_t)*0.38;
    const _hc=hitVignette.col;
    const _r=parseInt(_hc.slice(1,3),16),_g=parseInt(_hc.slice(3,5),16),_b=parseInt(_hc.slice(5,7),16);
    const _vg=ctx.createRadialGradient(CANVAS_W/2,CANVAS_H/2,90,CANVAS_W/2,CANVAS_H/2,CANVAS_W*0.72);
    _vg.addColorStop(0,'rgba(0,0,0,0)');
    _vg.addColorStop(1,`rgba(${_r},${_g},${_b},${_a})`);
    ctx.fillStyle=_vg;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  }

  // Sudden death closing ring
  if(suddenDeath){
    const _cx=AX+AW/2,_cy=AY+AH/2;
    ctx.strokeStyle=`rgba(255,0,0,${0.55+0.45*Math.sin(now*0.01)})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(_cx,_cy,deathRingR,0,Math.PI*2);ctx.stroke();
    const _vg=ctx.createRadialGradient(_cx,_cy,Math.max(0,deathRingR-30),_cx,_cy,deathRingR+20);
    _vg.addColorStop(0,'rgba(0,0,0,0)');_vg.addColorStop(1,'rgba(255,0,0,0.18)');
    ctx.fillStyle=_vg;ctx.fillRect(AX,AY,AW,AH);
    ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=`rgba(255,55,55,${0.75+0.25*Math.sin(now*0.008)})`;
    ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('\u26a0 SUDDEN DEATH',AX+AW/2,AY+AH-6);
  }
  // Sudden death countdown warning (2:00 → 2:30)
  if(roundTimer>=120000&&!suddenDeath){
    const _rem=Math.ceil((150000-roundTimer)/1000);
    const _pa=0.6+0.4*Math.sin(now*0.014);
    ctx.font='bold 12px "Courier New",monospace';
    ctx.fillStyle=`rgba(255,70,70,${_pa})`;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('\u26a0 SUDDEN DEATH IN '+_rem+'s',400,30);
  }
  // Kill feed (top-right inside arena)
  killFeed.forEach((k,i)=>{
    ctx.globalAlpha=Math.min(1,(k.life-k.age)/600);
    ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle=k.col;
    ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText(k.text,AX+AW-4,AY+18+i*14);
  });
  ctx.globalAlpha=1;

  const ts=Math.floor(battleTime/1000);
  ctx.font='bold 16px "Courier New", monospace';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TIME  '+String(~~(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0'),400,16);
  ctx.font='bold 14px "Courier New", monospace';ctx.fillStyle='#FFDD44';ctx.textAlign='right';
  ctx.fillText('UPGRADE: '+Math.max(0,Math.ceil((5000-upgradeTimer)/1000))+'s',620,16);
  // Speed button
  [1,2,4].forEach((_spd,_si)=>{
    const _sx=630+_si*42,_sy=8,_sw=36,_sh=20;
    const _act=gameSpeed===_spd;
    ctx.fillStyle=_act?'#223300':'#111';ctx.strokeStyle=_act?'#88FF44':'#444';ctx.lineWidth=1;
    ctx.fillRect(_sx,_sy,_sw,_sh);ctx.strokeRect(_sx+0.5,_sy+0.5,_sw-1,_sh-1);
    ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=_act?'#88FF44':'#666';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('\u00d7'+_spd,_sx+_sw/2,_sy+_sh/2);
  });
  // Arena name tag
  const _thCols=['#888888','#FF6600','#00CCFF','#9944DD','#FFAA33'];
  ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle=_thCols[arenaTheme];ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(arenaName+' ARENA',AX+4,AY+4);

  // ── HP STRIP ── exact arena width, AX → AX+AW, no overflow
  ctx.fillStyle='#050505';ctx.fillRect(AX,HP_Y,AW,HP_H);
  ctx.strokeStyle='#FFF';ctx.lineWidth=1;ctx.strokeRect(AX-0.5,HP_Y-0.5,AW+1,HP_H+1);

  const n=fighters.length;
  const slotW=Math.floor(AW/n);
  const _hpFont=n>=7?'bold 9px "Courier New",monospace':'bold 11px "Courier New",monospace';

  fighters.forEach((f,i)=>{
    const sx=AX+i*slotW;
    if(i>0){ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx,HP_Y+1);ctx.lineTo(sx,HP_Y+HP_H-1);ctx.stroke();}
    if(f.dead)ctx.globalAlpha=0.35;

    ctx.fillStyle=f.col;ctx.fillRect(sx+3,HP_Y+3,7,7);
    ctx.font=_hpFont;ctx.fillStyle=f.col;ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f.name,sx+13,HP_Y+2);

    if(f.dead){
      ctx.font=_hpFont;ctx.fillStyle='#FF3333';ctx.textAlign='center';
      ctx.fillText('OUT',sx+slotW/2,HP_Y+16);
    }else{
      const barX=sx+2,barY=HP_Y+14,barW=slotW-4,barH=8;
      const pct=f.hp/f.maxHp;const fillW=Math.max(0,Math.round(pct*barW));
      ctx.fillStyle='#660000';ctx.fillRect(barX,barY,barW,barH);
      const hpCol=pct<=0.10?'#FF2222':pct<=0.30?'#FF6600':'#00AA33';
      if(fillW>0){ctx.fillStyle=hpCol;ctx.fillRect(barX,barY,fillW,barH);}
      if(f.dmgBoost){ctx.fillStyle='rgba(255,170,0,0.3)';ctx.fillRect(barX,barY,fillW,barH);}
      else if(f.speedBoost){ctx.fillStyle='rgba(68,221,255,0.3)';ctx.fillRect(barX,barY,fillW,barH);}
      ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(barX+0.5,barY+0.5,barW-1,barH-1);
      ctx.font=_hpFont;ctx.fillStyle='#BBB';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(~~(f.hp+0.5),sx+slotW/2,HP_Y+25);
    }
    // Status effect dots
    if(!f.dead){
      let _dx=sx+2;const _dy=HP_Y+27;ctx.globalAlpha=1;
      if(f.burnTimer>0){ctx.fillStyle='#FF6600';ctx.fillRect(_dx,_dy,4,4);_dx+=7;}
      if(f.bleedStacks>0){ctx.fillStyle='#FF4444';ctx.fillRect(_dx,_dy,4,4);ctx.font='6px monospace';ctx.fillStyle='#FF8866';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(f.bleedStacks,_dx+5,_dy+3);_dx+=13;}
      if(f.slowTimer>0){ctx.fillStyle='#4488FF';ctx.fillRect(_dx,_dy,4,4);_dx+=7;}
      if(f.shield>0){ctx.fillStyle='#88CCFF';ctx.fillRect(_dx,_dy,4,4);_dx+=7;}
      if(f.regenBoost){ctx.fillStyle='#44FF88';ctx.fillRect(_dx,_dy,4,4);_dx+=7;}
      if(f.dmgBoost){ctx.fillStyle='#FFAA00';ctx.fillRect(_dx,_dy,4,4);_dx+=7;}
      if(f.speedBoost){ctx.fillStyle='#44DDFF';ctx.fillRect(_dx,_dy,4,4);}
    }
    ctx.globalAlpha=1;
  });
}

function drawOver(now){
  drawBattle(now);
  if(!winner)return;
  // 1 ── Dark vignette overlay
  const _ov=ctx.createRadialGradient(400,280,80,400,280,520);
  _ov.addColorStop(0,'rgba(0,0,0,0.55)');_ov.addColorStop(1,'rgba(0,0,0,0.88)');
  ctx.fillStyle=_ov;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  // 2 ── CRT lines
  ctx.fillStyle='rgba(0,0,0,0.05)';for(let _y=0;_y<CANVAS_H;_y+=4)ctx.fillRect(0,_y,CANVAS_W,1);
  // 3 ── Central panel
  ctx.fillStyle='rgba(8,0,20,0.82)';ctx.strokeStyle=winner.col;ctx.lineWidth=1.5;
  ctx.shadowColor=winner.col;ctx.shadowBlur=18;
  ctx.fillRect(160,58,480,410);ctx.strokeRect(160.5,58.5,479,409);
  ctx.shadowBlur=0;
  // corner brackets on panel
  const _pb=14;ctx.strokeStyle=winner.col;ctx.lineWidth=1.5;ctx.shadowColor=winner.col;ctx.shadowBlur=8;
  [[160,58,1,1],[640,58,-1,1],[160,468,1,-1],[640,468,-1,-1]].forEach(([cx,cy,sx,sy])=>{ctx.beginPath();ctx.moveTo(cx+sx*_pb,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*_pb);ctx.stroke();});
  ctx.shadowBlur=0;
  // 4 ── "WINNER!" pulsing header
  const _p=Math.sin(now*0.004);
  ctx.save();ctx.translate(400,100);ctx.scale(1+_p*0.04,1+_p*0.04);
  ctx.font='bold 13px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor=winner.col;ctx.shadowBlur=20+_p*10;ctx.fillStyle='#FFFFFF';
  ctx.fillText('\u2605  V I C T O R Y  \u2605',0,0);
  ctx.restore();ctx.shadowBlur=0;
  // 5 ── Winner orb
  const _gr=ctx.createRadialGradient(400,195,0,400,195,34);
  _gr.addColorStop(0,'#FFFFFF');_gr.addColorStop(0.35,winner.col);_gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.shadowColor=winner.col;ctx.shadowBlur=40+_p*20;
  ctx.fillStyle=_gr;ctx.beginPath();ctx.arc(400,195,34,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#FFFFFF';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  // 6 ── Fighter name
  ctx.font='bold 38px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor=winner.col;ctx.shadowBlur=22;ctx.fillStyle=winner.col;
  ctx.fillText(winner.name,400,240);ctx.shadowBlur=0;
  // 7 ── Category + win count
  const _cat={W:'⚔ WEAPONS',M:'✦ MAGIC',N:'✦ NATURE',C:'◆ CURSED',E:'★ ELDRITCH'};
  const _lb=getLeaderboard();const _wEntry=_lb.find(([n])=>n===winner.name);const _wWins=_wEntry?_wEntry[1]:1;
  ctx.font='11px "Courier New",monospace';ctx.fillStyle='#AA88CC';
  ctx.fillText((_cat[winner.cat]||winner.cat)+' \u00b7 '+_wWins+' total win'+(_wWins!==1?'s':''),400,285);
  // 8 ── Divider
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(200,310);ctx.lineTo(600,310);ctx.stroke();
  // 9 ── Top 3 mini-leaderboard
  ctx.font='9px "Courier New",monospace';ctx.fillStyle='#554477';ctx.fillText('TOP FIGHTERS',400,318);
  const _top=_lb.slice(0,3);const _rc=['#FFD700','#C0C0C0','#CD7F32'];
  _top.forEach(([name,wins],i)=>{
    const _def=DEFS.find(d=>d.name===name),_col=_def?_def.col:'#FFF';
    const _ty=335+i*28,_isW=name===winner.name;
    if(_isW){ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(195,_ty-2,410,22);}
    ctx.shadowColor=_col;ctx.shadowBlur=_isW?8:0;
    ctx.fillStyle=_rc[i];ctx.font='bold 11px "Courier New",monospace';ctx.textAlign='left';ctx.fillText('#'+(i+1),215,_ty);
    ctx.fillStyle=_col;ctx.fillRect(248,_ty+1,8,8);
    ctx.fillStyle=_isW?'#FFFFFF':_col;ctx.fillText(name,262,_ty);
    ctx.textAlign='right';ctx.fillStyle='#886699';ctx.fillText(wins+'W',590,_ty);
    ctx.textAlign='center';ctx.shadowBlur=0;
  });
  // 10 ── Battle stats row
  {const _bs=~~(battleDuration/1000),_bm=~~(_bs/60),_bsec=_bs%60;
  const _dur=_bm+':'+(String(_bsec).padStart(2,'0'));
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(200,400);ctx.lineTo(600,400);ctx.stroke();
  ctx.font='9px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='top';
  const _statParts=['\u23f1 '+_dur,(winner.dmgDealt>0?'\u2694 '+~~winner.dmgDealt+' DMG':''),(winner.hitsLanded>0?'\u25c6 '+winner.hitsLanded+' HIT'+(winner.hitsLanded!==1?'S':''):'')].filter(Boolean);
  ctx.fillStyle=winner.col+'99';ctx.fillText(_statParts.join('   \u00b7   '),400,407);}
  // 11 ── Buttons (click regions preserved exactly)
  ctx.textBaseline='top';
  if(tournament){
    ctx.fillStyle='rgba(8,0,20,0.9)';ctx.strokeStyle='#BB44FF';ctx.lineWidth=1;
    ctx.shadowColor='#BB44FF';ctx.shadowBlur=8;
    ctx.fillRect(220,450,260,28);ctx.strokeRect(220.5,450.5,259,27);ctx.shadowBlur=0;
    ctx.font='bold 12px "Courier New",monospace';ctx.fillStyle='#BB44FF';ctx.textAlign='center';
    ctx.fillText('[ VIEW BRACKET ]',350,457);
    ctx.fillStyle='rgba(8,0,20,0.9)';ctx.strokeStyle='#8888FF';ctx.lineWidth=1;
    ctx.fillRect(490,450,145,28);ctx.strokeRect(490.5,450.5,144,27);
    ctx.fillStyle='#8888FF';ctx.fillText('[ LEADERBOARD ]',562,457);
  }else{
    ctx.fillStyle='rgba(8,0,20,0.9)';ctx.strokeStyle='#44CC44';ctx.lineWidth=1;
    ctx.shadowColor='#44CC44';ctx.shadowBlur=6;
    ctx.fillRect(190,450,110,28);ctx.strokeRect(190.5,450.5,109,27);ctx.shadowBlur=0;
    ctx.font='bold 12px "Courier New",monospace';ctx.fillStyle='#44CC44';ctx.textAlign='center';
    ctx.fillText('[ MENU ]',245,457);
    ctx.fillStyle='rgba(8,0,20,0.9)';ctx.strokeStyle='#FFD700';ctx.lineWidth=1;
    ctx.shadowColor='#FFD700';ctx.shadowBlur=6;
    ctx.fillRect(315,450,120,28);ctx.strokeRect(315.5,450.5,119,27);ctx.shadowBlur=0;
    ctx.fillStyle='#FFD700';ctx.fillText('[ REMATCH ]',375,457);
    ctx.fillStyle='rgba(8,0,20,0.9)';ctx.strokeStyle='#8888FF';ctx.lineWidth=1;
    ctx.fillRect(450,450,145,28);ctx.strokeRect(450.5,450.5,144,27);
    ctx.fillStyle='#8888FF';ctx.fillText('[ LEADERBOARD ]',522,457);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.textBaseline='alphabetic';
}

// ─── INPUT ────────────────────────────────────────────────────────────────────

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sc=canvas.width/rect.width;
  const mx=(e.clientX-rect.left)*sc,my=(e.clientY-rect.top)*sc;

  if(state==='title'){
    if(mx>=20&&mx<=180&&my>=620&&my<=648)state='leaderboard';
    else if(mx>=200&&mx<=340&&my>=620&&my<=648)state='info';
    else state='select';
  }else if(state==='leaderboard'){
    if(mx>=300&&mx<=420&&my>=620&&my<=648)state='title';
    if(mx>=440&&mx<=560&&my>=620&&my<=648){localStorage.removeItem('ba_wins');}
  }else if(state==='info'){
    if(mx>=340&&mx<=460&&my>=620&&my<=648)state='title';
  }else if(state==='select'){
    [2,3,4,5,6,7,8].forEach((n,i)=>{
      const bx=10+i*36;if(mx>=bx&&mx<=bx+30&&my>=42&&my<=64){maxFighters=n;while(selected.length>maxFighters)selected.shift();}
    });
    if(mx>=268&&mx<=368&&my>=42&&my<=64)selected=[...DEFS].sort(()=>Math.random()-0.5).slice(0,maxFighters);
    if(mx>=378&&mx<=468&&my>=42&&my<=64&&selected.length===maxFighters)enterPerkDraft();
    if(mx>=478&&mx<=588&&my>=42&&my<=64&&selected.length===maxFighters&&(maxFighters===4||maxFighters===8))initTournament();
    // Arena buttons
    {const _ABY=264,_ABH=26,_ABW=100,_ABSX=8,_ABG=9;
    for(let ai=0;ai<6;ai++){const abx=_ABSX+ai*(_ABW+_ABG);if(mx>=abx&&mx<abx+_ABW&&my>=_ABY&&my<_ABY+_ABH)selectedArena=ai;}
    const _rBx=_ABSX+6*(_ABW+_ABG);if(mx>=_rBx&&mx<_rBx+_ABW&&my>=_ABY&&my<_ABY+_ABH)selectedArena=null;}
    [{cat:'W',x:0},{cat:'M',x:160},{cat:'N',x:320},{cat:'C',x:480},{cat:'E',x:640}].forEach(ci=>{
      if(mx>=ci.x&&mx<ci.x+160){
        DEFS.filter(d=>d.cat===ci.cat).forEach((def,di)=>{
          const ry=96+di*26;if(my>=ry&&my<ry+26){
            const idx=selected.findIndex(s=>s.id===def.id);
            if(idx>=0)selected.splice(idx,1);else{if(selected.length>=maxFighters)selected.shift();selected.push(def);}
          }
        });
      }
    });
  }else if(state==='battle'){
    [1,2,4].forEach((_spd,_si)=>{const _sx=630+_si*42;if(mx>=_sx&&mx<=_sx+36&&my>=8&&my<=28)gameSpeed=_spd;});
  }else if(state==='perkdraft'){
    const _colW=390,_gap=4,_cardW=~~((_colW-2*_gap)/3),_cardH=54,_labelH=14,_rowH=_labelH+_cardH+6;
    const _col0x=8,_col1x=402,_startY=46;
    perkChoices.forEach((choices,fi)=>{
      const colX=fi%2===0?_col0x:_col1x,rowY=_startY+~~(fi/2)*_rowH+_labelH;
      choices.forEach((pk,pi)=>{const cx=colX+pi*(_cardW+_gap);if(mx>=cx&&mx<=cx+_cardW&&my>=rowY&&my<=rowY+_cardH)perkSelections[fi]=pi;});
    });
    if(perkSelections.every(s=>s!==null)){fighterPerks=perkChoices.map((c,i)=>c[perkSelections[i]]);startBattle();}
  }else if(state==='bracket'){
    // [START MATCH / FINAL] button
    if(mx>=280&&mx<=520&&my>=590&&my<=618&&tournament&&!tournament.champion){
      const m=tournament.matches[tournament.matchIdx];
      if(m&&m.aIdx!==null&&m.aIdx>=0&&m.bIdx!==null&&m.bIdx>=0)startTournamentMatch();
    }
    // [EXIT] button
    if(mx>=560&&mx<=660&&my>=590&&my<=618){tournament=null;selected=[];state='title';}
  }else if(state==='over'){
    if(tournament){
      // [VIEW BRACKET] button
      if(mx>=220&&mx<=480&&my>=450&&my<=478){
        const _m=tournament.matches[tournament.matchIdx];
        if(_m){_m.winner=winner.id;tournament.matchIdx++;}
        const _mi=tournament.matchIdx,_ms=tournament.matches,_fi=tournament.fighters;
        if(_fi.length===8){
          if(_mi===4){_ms[4].aIdx=_fi.findIndex(f=>f.id===_ms[0].winner);_ms[4].bIdx=_fi.findIndex(f=>f.id===_ms[1].winner);}
          if(_mi===5){_ms[5].aIdx=_fi.findIndex(f=>f.id===_ms[2].winner);_ms[5].bIdx=_fi.findIndex(f=>f.id===_ms[3].winner);}
          if(_mi===6){_ms[6].aIdx=_fi.findIndex(f=>f.id===_ms[4].winner);_ms[6].bIdx=_fi.findIndex(f=>f.id===_ms[5].winner);}
          if(_mi>6)tournament.champion=winner;
        }else{
          if(_mi===2){_ms[2].aIdx=_fi.findIndex(f=>f.id===_ms[0].winner);_ms[2].bIdx=_fi.findIndex(f=>f.id===_ms[1].winner);}
          if(_mi>2)tournament.champion=winner;
        }
        winner=null;state='bracket';
      }
      if(mx>=490&&mx<=635&&my>=450&&my<=478)state='leaderboard';
    }else{
      if(mx>=190&&mx<=300&&my>=450&&my<=478){state='title';selected=[];winner=null;}
      if(mx>=315&&mx<=435&&my>=450&&my<=478){winner=null;enterPerkDraft();}
      if(mx>=450&&mx<=595&&my>=450&&my<=478)state='leaderboard';
    }
  }
});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(CANVAS_W/r.width);
  mouseY=(e.clientY-r.top)*(CANVAS_H/r.height);
});

// ─── LOOP ─────────────────────────────────────────────────────────────────────

function loop(now){
  const dt=Math.min(now-(lastTime||now),100)*gameSpeed;
  lastTime=now;update(dt);draw(now);requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
</script>
