// ─── AUDIO ────────────────────────────────────────────────────────────────────
const _AC=new(window.AudioContext||window.webkitAudioContext)();
const _sfxGate={};
function _sfxPlay(key,gap,fn){
  const t=_AC.currentTime;
  if(_sfxGate[key]&&t<_sfxGate[key])return;
  _sfxGate[key]=t+gap;
  if(_AC.state==='suspended')_AC.resume();
  fn(t);
}
function sfxHit(){_sfxPlay('hit',0.06,t=>{
  const o=_AC.createOscillator(),g=_AC.createGain();
  o.connect(g);g.connect(_AC.destination);
  o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(70,t+0.07);
  g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o.start(t);o.stop(t+0.1);
});}
function sfxBigHit(){_sfxPlay('bighit',0.12,t=>{
  const o=_AC.createOscillator(),g=_AC.createGain();
  o.connect(g);g.connect(_AC.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(45,t+0.18);
  g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.start(t);o.stop(t+0.25);
});}
function sfxDeath(){_sfxPlay('death',0.3,t=>{
  const o=_AC.createOscillator(),g=_AC.createGain();
  o.connect(g);g.connect(_AC.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(380,t);o.frequency.exponentialRampToValueAtTime(30,t+0.55);
  g.gain.setValueAtTime(0.20,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  o.start(t);o.stop(t+0.65);
});}
function sfxPickup(){_sfxPlay('pickup',0.1,t=>{
  const o=_AC.createOscillator(),g=_AC.createGain();
  o.connect(g);g.connect(_AC.destination);
  o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.setValueAtTime(900,t+0.06);
  g.gain.setValueAtTime(0.10,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.start(t);o.stop(t+0.2);
});}
function sfxStreak(n){_sfxPlay('streak',0.5,t=>{
  const f=n>=3?1200:900;
  const o=_AC.createOscillator(),g=_AC.createGain();
  o.connect(g);g.connect(_AC.destination);
  o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.setValueAtTime(f*1.5,t+0.08);
  g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.start(t);o.stop(t+0.38);
});}
function sfxSuddenDeath(){
  if(_AC.state==='suspended')_AC.resume();
  for(let _i=0;_i<3;_i++){
    const t=_AC.currentTime+_i*0.28;
    const o=_AC.createOscillator(),g=_AC.createGain();
    o.connect(g);g.connect(_AC.destination);
    o.type='square';o.frequency.setValueAtTime(880,t);
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.25);
  }
}

function addWin(name){
  const d=JSON.parse(localStorage.getItem('ba_wins')||'{}');
  d[name]=(d[name]||0)+1;
  localStorage.setItem('ba_wins',JSON.stringify(d));
}
function getLeaderboard(){
  return Object.entries(JSON.parse(localStorage.getItem('ba_wins')||'{}')).sort((a,b)=>b[1]-a[1]);
}

function spawnFighter(def,x,y){
  const allAbs=JSON.parse(JSON.stringify(def.abilities));
  allAbs.forEach(a=>{a.timer=0;if(a.type==='orbit')a.hcd={};});
  // Separate orbits: start with ONE, queue the rest to unlock via upgrades
  const orbits=allAbs.filter(a=>a.type==='orbit');
  const others=allAbs.filter(a=>a.type!=='orbit');
  const activeAbs=[...others,...(orbits.length>0?[orbits[0]]:[])];
  const pendingOrbits=orbits.slice(1);
  return {id:def.id,name:def.name,col:def.col,cat:def.cat,x,y,
    vx:(()=>{let v=(Math.random()-0.5)*5.6;return Math.abs(v)<0.9?(v<0?-0.9:0.9):v;})(),
    vy:(()=>{let v=(Math.random()-0.5)*5.6;return Math.abs(v)<0.9?(v<0?-0.9:0.9):v;})(),
    r:28,hp:def.maxHp||100,maxHp:def.maxHp||100,
    abilities:activeAbs,
    pendingOrbits:pendingOrbits,
    slowTimer:0,dead:false,
    speedBoost:null,dmgBoost:null,
    trail:[],hitFlash:0,burnTimer:0,burnDmg:0,burnTickTimer:0,burnCol:'#FF6600',
    regenBoost:null,shield:0,
    reflect:def.reflect||0,armor:def.armor||0,
    bleedStacks:0,bleedTickTimer:0,
    kills:0,killStreak:0,
    charge:0,maxCharge:def.overcharge?30:0,
    freezeTimer:0,cursed:null,leechTickTimer:0,
    lifeLeech:def.lifeLeech||false,
    thorns:def.thorns||0,
    dmgDealt:0,hitsLanded:0};
}

  fighters=[];projectiles=[];rings=[];clouds=[];clones=[];dmgNums=[];powerups=[];
  battleTime=0;battleDuration=0;upgradeTimer=0;upgradeStep=0;powerupTimer=0;killFeed=[];shakeTimer=0;shakeAmt=0;roundTimer=0;suddenDeath=false;suddenDmgTimer=0;suddenDeathWarned=false;hazards=[];hazardTimer=0;hazardSpawned=false;sparks=[];hitVignette=null;gameSpeed=1;hitStopFrames=0;deathRings=[];
  // Pick random arena theme + layout
  const ARENA_PRESETS=[
    {theme:0,name:'DUNGEON',ax:130,ay:48,aw:540,ah:510},
    {theme:1,name:'VOLCANO',ax:30, ay:55,aw:740,ah:495},
    {theme:2,name:'CYBER',  ax:210,ay:35,aw:380,ah:545},
    {theme:3,name:'COSMOS', ax:95, ay:42,aw:610,ah:540},
    {theme:4,name:'DOJO',   ax:165,ay:58,aw:470,ah:478},
    {theme:5,name:'ICE',    ax:100,ay:50,aw:600,ah:508},
  ];
  const _p=ARENA_PRESETS[selectedArena!==null?selectedArena:~~(Math.random()*ARENA_PRESETS.length)];
  AX=_p.ax;AY=_p.ay;AW=_p.aw;AH=_p.ah;HP_Y=AY+AH+4;
  arenaTheme=_p.theme;arenaName=_p.name;deathRingR=Math.hypot(AW,AH)/2+60;
  if(arenaTheme===3)arenaStars=Array.from({length:70},()=>({
    x:10+Math.random()*(CANVAS_W-20),y:10+Math.random()*(CANVAS_H-20),
    b:0.3+Math.random()*0.7,spd:0.4+Math.random()*1.2,phase:Math.random()*Math.PI*2
  }));else arenaStars=[];
  arenaParticles=[];
  if(arenaTheme===0){
    for(let i=0;i<7;i++){
      const x=AX+15+Math.random()*(AW-30), y=AY+15+Math.random()*(AH-30);
      const segs=Array.from({length:2+~~(Math.random()*3)},()=>({dx:(Math.random()-0.5)*28,dy:(Math.random()-0.5)*22}));
      arenaParticles.push({type:'crack',x,y,segs});
    }
  }else if(arenaTheme===1){
    arenaParticles=Array.from({length:22},()=>({
      x:AX+Math.random()*AW, y:AY+Math.random()*AH,
      vy:0.25+Math.random()*0.55, phase:Math.random()*Math.PI*2
    }));
  }else if(arenaTheme===2){
    for(let gx=40;gx<AW;gx+=80) arenaParticles.push({axis:'v',x:AX+gx,spd:25+Math.random()*45,phase:Math.random()*AH});
    for(let gy=40;gy<AH;gy+=80) arenaParticles.push({axis:'h',y:AY+gy,spd:18+Math.random()*35,phase:Math.random()*AW});
  }else if(arenaTheme===3){
    arenaParticles=Array.from({length:2},()=>({active:false,x:0,y:0,vx:0,vy:0,life:0,cd:4000+Math.random()*7000}));
    const _pr=55+~~(Math.random()*30);
    arenaPlanet={
      x:AX-_pr-10-~~(Math.random()*20), y:AY+~~(AH*(0.2+Math.random()*0.25)),
      r:_pr, col:'#120820', tilt:0.18+Math.random()*0.35
    };
  }else if(arenaTheme===4){
    arenaParticles=Array.from({length:14},()=>({
      x:AX+Math.random()*AW, y:AY+Math.random()*AH,
      vx:(Math.random()-0.5)*0.07, vy:-0.04-Math.random()*0.09,
      sz:0.8+Math.random()*1.4, phase:Math.random()*Math.PI*2
    }));
  }else if(arenaTheme===5){
    // ICE — drifting snowflakes
    arenaParticles=Array.from({length:24},()=>({
      x:AX+Math.random()*AW, y:AY+Math.random()*AH,
      vx:(Math.random()-0.5)*0.10, vy:0.05+Math.random()*0.10,
      sz:0.8+Math.random()*1.8, phase:Math.random()*Math.PI*2
    }));
  }
  const margin=60,positions=[];
  for(let i=0;i<selected.length;i++){
    let px,py,ok,tries=0;
    do{
      px=AX+margin+Math.random()*(AW-margin*2);
      py=AY+margin+Math.random()*(AH-margin*2);
      ok=positions.every(p=>Math.hypot(px-p.x,py-p.y)>90);
      tries++;
    }while(!ok&&tries<100);
    positions.push({x:px,y:py});
    fighters.push(spawnFighter(selected[i],px,py));
  }
  fighters.forEach((f,i)=>{ if(fighterPerks[i])fighterPerks[i].apply(f); });
  applySynergies(fighters);
  state='battle';
}

function dealDamage(target,dmg,col){
  if(target.dead)return;
  if(target.shield>0){
    const abs=Math.min(target.shield,dmg);
    target.shield-=abs;dmg-=abs;
    if(dmg<=0){target.hitFlash=80;return;}
  }
  if(target.armor>0)dmg=Math.max(1,dmg-target.armor);
  if(target.cursed&&target.cursed.timer>0)dmg=Math.ceil(dmg*1.5);
  target.hp-=dmg;
  target.hitFlash=140;
  {const _atkr=col?fighters.find(ff=>!ff.dead&&ff.col===col):null;if(_atkr&&_atkr!==target){_atkr.dmgDealt+=dmg;_atkr.hitsLanded++;}}
  dmgNums.push({x:target.x+(Math.random()-0.5)*20,y:target.y-target.r-10,
    val:dmg,col:col||'#FFF',life:1200,age:0});
  if(dmg>=3){for(let _si=0;_si<6;_si++){const _sa=Math.random()*Math.PI*2,_ss=1.5+Math.random()*3;sparks.push({x:target.x,y:target.y,vx:Math.cos(_sa)*_ss,vy:Math.sin(_sa)*_ss,col:col||'#FFF',life:320,age:0,sz:1+Math.random()*2.5});}}
  if(dmg>=5)hitVignette={col:col||'#FF2200',life:500,age:0};
  if(dmg>=10&&shakeTimer<100){shakeTimer=180;shakeAmt=Math.max(shakeAmt,4);sfxBigHit();hitStopFrames=Math.max(hitStopFrames,2);}else{sfxHit();}
  if(target.hp<=0){target.hp=0;if(!target.dead){target.dead=true;target.killStreak=0;sfxDeath();hitStopFrames=Math.max(hitStopFrames,4);
    deathRings.push({x:target.x,y:target.y,col:target.col,r:target.r*0.5,life:500,age:0});
    for(let _di2=0;_di2<22;_di2++){const _da=(_di2/22)*Math.PI*2+Math.random()*0.28,_ds=2+Math.random()*5;sparks.push({x:target.x,y:target.y,vx:Math.cos(_da)*_ds,vy:Math.sin(_da)*_ds,col:target.col,life:700,age:0,sz:2.5+Math.random()*4});}
    const _kl=fighters.find(ff=>!ff.dead&&ff.col===col);
    if(_kl){_kl.kills++;_kl.killStreak++;
      if(_kl.killStreak===2){_kl.speedBoost={mult:1.5,timer:6000};dmgNums.push({x:_kl.x,y:_kl.y-_kl.r-15,val:'DOUBLE KILL!',col:'#FFDD00',life:2000,age:0});sfxStreak(2);}
      else if(_kl.killStreak>=3){_kl.dmgBoost={bonus:5,timer:8000};dmgNums.push({x:_kl.x,y:_kl.y-_kl.r-15,val:'TRIPLE KILL!',col:'#FF8800',life:2500,age:0});sfxStreak(3);}
    }
    killFeed.unshift({text:target.name+' \u2620',col:target.col,age:0,life:3200});if(killFeed.length>3)killFeed.pop();rings.push({x:target.x,y:target.y,r:0,maxR:90,dmg:0,col:target.col,owner:-1,hit:{},isSlow:false,sub:'',pull:0,healArea:0,knockback:0,executeBonus:false,explodeOnExpiry:false});for(let _di=0;_di<8;_di++){const _a=_di/8*Math.PI*2;dmgNums.push({x:target.x+Math.cos(_a)*30,y:target.y+Math.sin(_a)*30,val:'\u2605',col:target.col,life:1100,age:0});}shakeTimer=300;shakeAmt=Math.max(shakeAmt,7);}}
  if(target.maxCharge>0&&!target.dead){
    target.charge+=dmg;
    if(target.charge>=target.maxCharge){
      target.charge=0;
      rings.push({x:target.x,y:target.y,r:0,maxR:110,dmg:20,col:target.col,owner:target.id,hit:{},isSlow:false,sub:'overload',pull:0,healArea:0,knockback:0,executeBonus:false,explodeOnExpiry:false});
    }
  }
}

function spawnPowerup(){
  const t=PU_TYPES[~~(Math.random()*PU_TYPES.length)];
  const mg=30;
  powerups.push({
    x:AX+mg+Math.random()*(AW-mg*2),
    y:AY+mg+Math.random()*(AH-mg*2),
    type:t.type,col:t.col,label:t.label,
    age:0,life:PU_LIFE,r:PU_R,rot:Math.random()*Math.PI*2
  });
}

function update(dt){
  if(state==='title')updateTitle(dt);
  else if(state==='battle')updateBattle(dt);
  else if(state==='perkdraft')updatePerkDraft(dt);
}

function updateTitle(dt){
  titlePulse+=dt;
  blinkTimer+=dt;
  if(blinkTimer>=600){blinkTimer=0;blinkOn=!blinkOn;}
  // Stars twinkle
  stars.forEach(s=>{s.b+=s.db;if(s.b<0){s.b=0;s.db=-s.db;}if(s.b>1){s.b=1;s.db=-s.db;}});
  // Orbs orbit
  titleOrbs.forEach(o=>{
    o.trail.push({x:400+Math.cos(o.ang)*110,y:360+Math.sin(o.ang)*110});
    if(o.trail.length>10)o.trail.shift();
    o.ang+=o.spd*dt/1000;
  });
  // Spark spawn (capped at 40)
  if(titleSparks.length<40&&Math.random()<0.35){
    titleSparks.push({x:160+Math.random()*480,y:440+Math.random()*180,vx:(Math.random()-0.5)*0.6,vy:-(0.4+Math.random()*0.9),life:1,decay:0.006+Math.random()*0.008,col:TITLE_ORB_COLS[Math.floor(Math.random()*TITLE_ORB_COLS.length)],sz:1+Math.random()*1.5});
  }
  for(let i=titleSparks.length-1;i>=0;i--){const s=titleSparks[i];s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;if(s.life<=0)titleSparks.splice(i,1);}
}

function updateBattle(dt){
  if(hitStopFrames>0){hitStopFrames--;return;}
  for(let _i=deathRings.length-1;_i>=0;_i--){const _dr=deathRings[_i];_dr.age+=dt;_dr.r+=dt*0.38;if(_dr.age>=_dr.life)deathRings.splice(_i,1);}
  battleTime+=dt;upgradeTimer+=dt;roundTimer+=dt;
  if(!suddenDeath&&roundTimer>=150000){suddenDeath=true;}
  if(!suddenDeathWarned&&roundTimer>=120000){suddenDeathWarned=true;sfxSuddenDeath();}
  // Orbit speed: starts very slow (0.13×), ramps to 1.3× over 2 minutes
  const orbitMult=Math.min(0.13+(battleTime/120000)*1.17,1.3);
  const alive=fighters.filter(f=>!f.dead);
  updateHazards(dt,alive);
  if(suddenDeath){deathRingR=Math.max(20,deathRingR-12*(dt/1000));suddenDmgTimer+=dt;if(suddenDmgTimer>=500){suddenDmgTimer=0;const _cx=AX+AW/2,_cy=AY+AH/2;fighters.forEach(f=>{if(!f.dead&&Math.hypot(f.x-_cx,f.y-_cy)>deathRingR)dealDamage(f,5,'#FF2200');});}}

  if(upgradeTimer>=5000){
    upgradeTimer-=5000;
    alive.forEach(f=>applyUpgrade(f,upgradeStep));
    upgradeStep=(upgradeStep+1)%4;
  }

  alive.forEach(f=>{
    if(f.slowTimer>0){f.vx*=0.985;f.vy*=0.985;const _spd=Math.hypot(f.vx,f.vy);if(_spd>0&&_spd<0.55){const _s=0.55/_spd;f.vx*=_s;f.vy*=_s;}f.slowTimer-=dt;if(f.slowTimer<0)f.slowTimer=0;}
    if(f.speedBoost){f.speedBoost.timer-=dt;if(f.speedBoost.timer<=0)f.speedBoost=null;}
    if(f.dmgBoost){f.dmgBoost.timer-=dt;if(f.dmgBoost.timer<=0)f.dmgBoost=null;}
    if(f.regenBoost){f.regenBoost.timer-=dt;f.hp=Math.min(f.maxHp,f.hp+4*(dt/1000));if(f.regenBoost.timer<=0)f.regenBoost=null;}
    if(f.bleedStacks>0){f.bleedTickTimer=(f.bleedTickTimer||0)+dt;while(f.bleedTickTimer>=1000){f.bleedTickTimer-=1000;dealDamage(f,f.bleedStacks,'#FF6644');}}
    if(f.hitFlash>0)f.hitFlash=Math.max(0,f.hitFlash-dt);
    if(f.burnTimer>0){f.burnTimer-=dt;f.burnTickTimer=(f.burnTickTimer||0)+dt;if(f.burnTickTimer>=500){f.burnTickTimer-=500;dealDamage(f,f.burnDmg,f.burnCol||'#FF6600');}if(f.burnTimer<=0){f.burnTimer=0;f.burnTickTimer=0;}}
    if(f.cursed){f.cursed.timer-=dt;if(f.cursed.timer<=0)f.cursed=null;}
    if(f.freezeTimer>0){f.freezeTimer=Math.max(0,f.freezeTimer-dt);f.vx*=0.80;f.vy*=0.80;}
    if(f.lifeLeech){f.leechTickTimer=(f.leechTickTimer||0)+dt;if(f.leechTickTimer>=500){f.leechTickTimer-=500;fighters.filter(e=>!e.dead&&e!==f&&Math.hypot(e.x-f.x,e.y-f.y)<110).forEach(e=>{dealDamage(e,2,f.col);f.hp=Math.min(f.maxHp,f.hp+2);});}}
    const spMult=f.speedBoost?f.speedBoost.mult:1;
    f.x+=f.vx*spMult*(dt/16);f.y+=f.vy*spMult*(dt/16);
    if(f.x-f.r<AX){f.x=AX+f.r;f.vx=Math.abs(f.vx);if(arenaTheme===5){const _s=Math.hypot(f.vx,f.vy);if(_s<7.5)f.vx*=1.14;}}
    if(f.x+f.r>AX+AW){f.x=AX+AW-f.r;f.vx=-Math.abs(f.vx);if(arenaTheme===5){const _s=Math.hypot(f.vx,f.vy);if(_s<7.5)f.vx*=1.14;}}
    if(f.y-f.r<AY){f.y=AY+f.r;f.vy=Math.abs(f.vy);if(arenaTheme===5){const _s=Math.hypot(f.vx,f.vy);if(_s<7.5)f.vy*=1.14;}}
    if(f.y+f.r>AY+AH){f.y=AY+AH-f.r;f.vy=-Math.abs(f.vy);if(arenaTheme===5){const _s=Math.hypot(f.vx,f.vy);if(_s<7.5)f.vy*=1.14;}}
    // Movement trail
    const lastT=f.trail[f.trail.length-1];
    if(!lastT||Math.hypot(f.x-lastT.x,f.y-lastT.y)>6)f.trail.push({x:f.x,y:f.y,age:0});
    f.trail.forEach(t=>t.age+=dt);
    while(f.trail.length>0&&f.trail[0].age>350)f.trail.shift();
  });

  for(let i=0;i<alive.length;i++)for(let j=i+1;j<alive.length;j++){
    const a=alive[i],b=alive[j];
    const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),minD=a.r+b.r;
    if(dist<minD&&dist>0){
      const nx=dx/dist,ny=dy/dist,ov=(minD-dist)/2;
      a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
      const dvx=b.vx-a.vx,dvy=b.vy-a.vy,dot=dvx*nx+dvy*ny;
      if(dot<0){a.vx+=dot*nx;a.vy+=dot*ny;b.vx-=dot*nx;b.vy-=dot*ny;}
    }
  }

  alive.forEach(f=>{
    const enemies=alive.filter(e=>e.id!==f.id);
    const dmgBonus=f.dmgBoost?f.dmgBoost.bonus:0;
    f.abilities.forEach(ab=>{
      if(ab.type==='orbit'){
        ab.ang+=ab.spd*orbitMult*(dt/16);
        const ox=f.x+Math.cos(ab.ang)*ab.rad,oy=f.y+Math.sin(ab.ang)*ab.rad;
        ab._x=ox;ab._y=oy;ab._ang=ab.ang;
        enemies.forEach(e=>{
          const d=Math.hypot(ox-e.x,oy-e.y);
          if(d<ab.sz+e.r){
            const hcdRate=ab.multiHit?400:800;
            if(!ab.hcd[e.id]||battleTime-ab.hcd[e.id]>=hcdRate){
              ab.hcd[e.id]=battleTime;
              const rageMult=(ab.rageMode&&f.hp/f.maxHp<0.5)?1.5:1;
              const execMult=(ab.executeBonus&&e.hp/e.maxHp<0.3)?2:1;
              const hitDmg=~~((ab.dmg+dmgBonus)*rageMult*execMult);
              dealDamage(e,hitDmg,ab.col);
              if(e.reflect>0&&!f.dead)dealDamage(f,~~(hitDmg*e.reflect),e.col);
              if(e.thorns>0&&!f.dead)dealDamage(f,e.thorns,e.col);
              if(ab.bleed)e.bleedStacks=Math.min((e.bleedStacks||0)+1,2);
              if(ab.healOnHit)f.hp=Math.min(f.maxHp,f.hp+ab.healOnHit);
              if(ab.knockback){const dx=e.x-ox,dy=e.y-oy,dd=Math.hypot(dx,dy)||1;e.vx+=dx/dd*ab.knockback;e.vy+=dy/dd*ab.knockback;}
              if(ab.burnOnHit&&!e.dead){e.burnTimer=Math.max(e.burnTimer,1500);e.burnDmg=ab.burnOnHit;e.burnCol=ab.col;}
              if(ab.curseOnHit)e.cursed={timer:3000};
              if(ab.freeze)e.freezeTimer=Math.max(e.freezeTimer,400);
              if(ab.splash&&!e.dead){fighters.filter(f2=>!f2.dead&&f2.id!==e.id&&f2.id!==f.id).forEach(ne=>{if(Math.hypot(ox-ne.x,oy-ne.y)<ab.splash+ne.r)dealDamage(ne,~~((ab.dmg+dmgBonus)*0.5),ab.col);});}
            }
          }
        });
      }else if(ab.type==='projectile'){
        ab.timer-=dt;
        if(ab.timer<=0){
          ab.timer=ab.rate;
          if(enemies.length>0){
            let nearest=enemies[0],nd=Math.hypot(f.x-enemies[0].x,f.y-enemies[0].y);
            enemies.forEach(e=>{const d=Math.hypot(f.x-e.x,f.y-e.y);if(d<nd){nd=d;nearest=e;}});
            for(let c=0;c<ab.cnt;c++){
              const spread=ab.cnt>1?(c-(ab.cnt-1)/2)*0.2:0;
              const ang=Math.atan2(nearest.y-f.y,nearest.x-f.x)+spread;
              projectiles.push({x:f.x,y:f.y,
                vx:Math.cos(ang)*ab.spd,vy:Math.sin(ang)*ab.spd,
                dmg:ab.dmg+dmgBonus,col:ab.col,sz:ab.sz,sub:ab.sub,
                owner:f.id,bounces:0,maxBounces:ab.ricochet?3:2,trail:[],
                homing:ab.homing||false,pierce:ab.pierce||false,
                ricochet:ab.ricochet||false,
                splash:ab.splash||0,chainLightning:ab.chainLightning||false,
                burnOnHit:ab.burnOnHit||0,slowOnHit:ab.slowOnHit||false,
                splitShot:ab.splitShot||false,isSplit:false,ang:Math.atan2(nearest.y-f.y,nearest.x-f.x)+spread});
            }
          }
        }
      }else if(ab.type==='area'){
        ab.timer-=dt;
        if(ab.timer<=0){
          ab.timer=ab.rate;
          if(ab.spawnClone){
            const ang=Math.random()*Math.PI*2;
            const _cEn=fighters.filter(ff=>!ff.dead&&ff.id!==f.id);
            const _cT=_cEn.length?_cEn.reduce((a,b)=>Math.hypot(a.x-f.x,a.y-f.y)<Math.hypot(b.x-f.x,b.y-f.y)?a:b):null;
            const _cX=_cT?_cT.x+Math.cos(ang)*35:f.x+Math.cos(ang)*40;
            const _cY=_cT?_cT.y+Math.sin(ang)*35:f.y+Math.sin(ang)*40;
            clones.push({
              x:Math.max(AX+20,Math.min(AX+AW-20,_cX)), y:Math.max(AY+20,Math.min(AY+AH-20,_cY)),
              col:f.col, r:f.r*0.8, life:4000, age:0, ownerId:f.id,
              orbAng:0, orbRad:52,
              orbDmg:Math.max(2,~~(f.abilities[0].dmg*0.7)),
              orbCol:f.col, orbSz:8, hcd:{}
            });
          } else if(ab.blink){
            const _bt=fighters.filter(ff=>!ff.dead&&ff!==f);
            if(_bt.length){const _be=_bt.reduce((a,b)=>{const da=(a.x-f.x)**2+(a.y-f.y)**2,db=(b.x-f.x)**2+(b.y-f.y)**2;return da<db?a:b;});const _ba=Math.random()*Math.PI*2;f.x=Math.max(AX+25,Math.min(AX+AW-25,_be.x+Math.cos(_ba)*40));f.y=Math.max(AY+25,Math.min(AY+AH-25,_be.y+Math.sin(_ba)*40));}else{f.x=AX+25+Math.random()*(AW-50);f.y=AY+25+Math.random()*(AH-50);}
            dmgNums.push({x:f.x,y:f.y-f.r-10,val:'BLINK!',col:f.col,life:900,age:0});
          } else if(ab.grantArmor){
            f.armor=Math.min((f.armor||0)+ab.grantArmor,4);
            dmgNums.push({x:f.x,y:f.y-f.r-10,val:'ARM+'+ab.grantArmor,col:f.col,life:900,age:0});
          } else if(ab.sacrifice){
            if(f.hp>ab.hpCost+5){
              dealDamage(f,ab.hpCost,f.col);
              rings.push({x:f.x,y:f.y,r:0,maxR:130,dmg:ab.burstDmg,col:f.col,owner:f.id,hit:{},isSlow:false,sub:'sacrifice',pull:0,healArea:0,knockback:0,executeBonus:false,explodeOnExpiry:false});
              dmgNums.push({x:f.x,y:f.y-f.r-10,val:'SACRIFICE!',col:f.col,life:1100,age:0});
            }
          } else {
            rings.push({x:f.x,y:f.y,r:0,maxR:ab.rad,dmg:ab.dmg+dmgBonus,
              col:ab.col,owner:f.id,hit:{},isSlow:ab.isSlow||false,sub:ab.sub,
              pull:ab.pull||0,healArea:ab.healArea||0,knockback:ab.knockback||0,
              executeBonus:ab.executeBonus||false,explodeOnExpiry:ab.explodeOnExpiry||false,
              curseOnHit:ab.curseOnHit||false});
          }
        }
      }
    });
  });

  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    if(p.trail){p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();}
    if(p.homing){const tgts=fighters.filter(f=>!f.dead&&f.id!==p.owner);if(tgts.length>0){let near=tgts[0],nd=Math.hypot(p.x-tgts[0].x,p.y-tgts[0].y);tgts.forEach(t=>{const d=Math.hypot(p.x-t.x,p.y-t.y);if(d<nd){nd=d;near=t;}});const spd=Math.hypot(p.vx,p.vy),ca=Math.atan2(p.vy,p.vx),ta=Math.atan2(near.y-p.y,near.x-p.x);let diff=((ta-ca+Math.PI*3)%(Math.PI*2))-Math.PI;const na=ca+Math.sign(diff)*Math.min(Math.abs(diff),0.1);p.vx=Math.cos(na)*spd;p.vy=Math.sin(na)*spd;}}
    p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);
    let remove=false;
    let wallBounced=false;
    if(p.x-p.sz<AX){p.x=AX+p.sz;p.vx=Math.abs(p.vx);p.bounces++;wallBounced=true;}
    else if(p.x+p.sz>AX+AW){p.x=AX+AW-p.sz;p.vx=-Math.abs(p.vx);p.bounces++;wallBounced=true;}
    if(p.y-p.sz<AY){p.y=AY+p.sz;p.vy=Math.abs(p.vy);p.bounces++;wallBounced=true;}
    else if(p.y+p.sz>AY+AH){p.y=AY+AH-p.sz;p.vy=-Math.abs(p.vy);p.bounces++;wallBounced=true;}
    if(wallBounced&&p.ricochet)p.piercedIds=new Set();
    if(p.bounces>p.maxBounces)remove=true;
    if(!remove){
      const ca=fighters.filter(f=>!f.dead);
      for(let k=0;k<ca.length;k++){
        const e=ca[k];if(e.id===p.owner)continue;
        if((p.pierce||p.ricochet)&&p.piercedIds&&p.piercedIds.has(e.id))continue;
        if(Math.hypot(p.x-e.x,p.y-e.y)<p.sz+e.r){
          dealDamage(e,p.dmg,p.col);
          if(p.burnOnHit&&!e.dead){e.burnTimer=Math.max(e.burnTimer,1500);e.burnDmg=p.burnOnHit;e.burnCol=p.col;}
          if(p.slowOnHit)e.slowTimer=Math.max(e.slowTimer,1200);
          if(p.chainLightning&&!p.chained){const oth=fighters.filter(f=>!f.dead&&f.id!==p.owner&&f.id!==e.id);if(oth.length>0){let near=oth[0],nd=Math.hypot(p.x-oth[0].x,p.y-oth[0].y);oth.forEach(t=>{const d=Math.hypot(p.x-t.x,p.y-t.y);if(d<nd){nd=d;near=t;}});const spd=Math.hypot(p.vx,p.vy);projectiles.push({x:p.x,y:p.y,vx:(near.x-p.x)/nd*spd,vy:(near.y-p.y)/nd*spd,dmg:~~(p.dmg*0.4),col:p.col,sz:~~(p.sz*0.8),sub:p.sub,owner:p.owner,bounces:0,maxBounces:0,trail:[],chained:true,homing:false,pierce:false,splash:0,chainLightning:false,burnOnHit:0,slowOnHit:false});}}
          if(p.splash){fighters.filter(f=>!f.dead&&f.id!==p.owner&&f.id!==e.id).forEach(ne=>{if(Math.hypot(p.x-ne.x,p.y-ne.y)<p.splash+ne.r)dealDamage(ne,~~(p.dmg*0.5),p.col);});}
          if(p.splitShot&&!p.isSplit){const _pspd=Math.hypot(p.vx,p.vy);for(const _da of[-0.6,0.6]){const _na=Math.atan2(p.vy,p.vx)+_da;projectiles.push({...p,vx:Math.cos(_na)*_pspd,vy:Math.sin(_na)*_pspd,x:p.x,y:p.y,isSplit:true,piercedIds:new Set([e.id]),col:_da<0?'#FF88FF':'#AAFFFF',trail:[]});}}
          if(p.pierce||p.ricochet){if(!p.piercedIds)p.piercedIds=new Set();p.piercedIds.add(e.id);}
          else{remove=true;break;}
        }
      }
      if(p.pierce&&p.piercedIds&&p.piercedIds.size>=fighters.filter(f=>!f.dead&&f.id!==p.owner).length)remove=true;
    }
    if(remove)projectiles.splice(i,1);
  }

  for(let i=rings.length-1;i>=0;i--){
    const rng=rings[i],prevR=rng.r;
    rng.r+=120*(dt/1000);
    fighters.filter(f=>!f.dead).forEach(e=>{
      if(e.id===rng.owner||rng.hit[e.id])return;
      const d=Math.hypot(rng.x-e.x,rng.y-e.y);
      if(d<=rng.r&&d>=prevR-5){
        rng.hit[e.id]=true;
        if(rng.isSlow)e.slowTimer=2000;
        else{const x2=rng.executeBonus&&e.hp/e.maxHp<0.3?2:1;dealDamage(e,rng.dmg*x2,rng.col);}
        if(rng.curseOnHit)e.cursed={timer:3000};
        if(rng.knockback){const dx=e.x-rng.x,dy=e.y-rng.y,dd=Math.hypot(dx,dy)||1;e.vx+=dx/dd*rng.knockback;e.vy+=dy/dd*rng.knockback;}
      }
    });
    if(rng.r>=rng.maxR){
      clouds.push({x:rng.x,y:rng.y,r:rng.maxR,col:rng.col,
        dmg:rng.healArea||rng.dmg===0?0:Math.max(1,~~(rng.dmg*0.4)),
        owner:rng.owner,life:3000,age:0,tickTimer:0,tickRate:800,
        isSlow:rng.isSlow||false,sub:rng.sub||'',
        pull:rng.pull||0,healArea:rng.healArea||0,
        explodeOnExpiry:rng.explodeOnExpiry||false});
      rings.splice(i,1);
    }
  }

  for(let i=clouds.length-1;i>=0;i--){
    const cl=clouds[i];cl.age+=dt;cl.tickTimer+=dt;
    if(cl.tickTimer>=cl.tickRate){
      cl.tickTimer-=cl.tickRate;
      if(cl.healArea){const ow=fighters.find(f=>f.id===cl.owner&&!f.dead);if(ow)ow.hp=Math.min(ow.maxHp,ow.hp+cl.healArea);}
      fighters.filter(f=>!f.dead&&f.id!==cl.owner).forEach(e=>{
        if(Math.hypot(e.x-cl.x,e.y-cl.y)<cl.r+e.r){
          if(cl.isSlow)e.slowTimer=Math.max(e.slowTimer,1200);
          if(cl.dmg>0)dealDamage(e,cl.dmg,cl.col);
          if(cl.curseOnHit)e.cursed={timer:3000};
          if(cl.pull){const dx=cl.x-e.x,dy=cl.y-e.y,d=Math.hypot(dx,dy)||1;e.vx+=dx/d*cl.pull*(dt/16);e.vy+=dy/d*cl.pull*(dt/16);}
        }
      });
    }
    if(cl.age>=cl.life){
      if(cl.explodeOnExpiry){
        fighters.filter(f=>!f.dead&&f.id!==cl.owner).forEach(e=>{if(Math.hypot(e.x-cl.x,e.y-cl.y)<cl.r+e.r)dealDamage(e,Math.max(1,cl.dmg)*4,cl.col);});
        rings.push({x:cl.x,y:cl.y,r:cl.r*0.7,maxR:cl.r*1.2,dmg:0,col:cl.col,owner:cl.owner,hit:{},isSlow:false,sub:'explode',pull:0,healArea:0,knockback:0,executeBonus:false,explodeOnExpiry:false});
      }
      clouds.splice(i,1);
    }
  }

  // Clone update (PHANTOM ghosts)
  for(let i=clones.length-1;i>=0;i--){
    const cl=clones[i];cl.age+=dt;
    if(cl.age>=cl.life){clones.splice(i,1);continue;}
    cl.orbAng+=dt*0.003;
    const ox=cl.x+Math.cos(cl.orbAng)*cl.orbRad;
    const oy=cl.y+Math.sin(cl.orbAng)*cl.orbRad;
    fighters.filter(f=>!f.dead&&f.id!==cl.ownerId).forEach(e=>{
      if(Math.hypot(ox-e.x,oy-e.y)<cl.orbSz+e.r){
        if(!cl.hcd[e.id]||battleTime-cl.hcd[e.id]>=800){
          cl.hcd[e.id]=battleTime;
          dealDamage(e,cl.orbDmg,cl.orbCol);
        }
      }
    });
  }

  for(let _i=sparks.length-1;_i>=0;_i--){
    const _s=sparks[_i];_s.age+=dt;_s.x+=_s.vx;_s.y+=_s.vy;
    _s.vx*=0.91;_s.vy*=0.91;
    if(_s.age>=_s.life)sparks.splice(_i,1);
  }
  if(hitVignette){hitVignette.age+=dt;if(hitVignette.age>=hitVignette.life)hitVignette=null;}

  powerupTimer+=dt;
  if(powerupTimer>=PU_INTERVAL){
    powerupTimer-=PU_INTERVAL;
    const spawnCount=1+Math.min(Math.floor(battleTime/20000),4);
    for(let i=0;i<spawnCount;i++)spawnPowerup();
  }
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];pu.age+=dt;pu.rot+=0.03;
    if(pu.age>=pu.life){powerups.splice(i,1);continue;}
    for(const f of alive){
      if(Math.hypot(f.x-pu.x,f.y-pu.y)<f.r+pu.r){
        if(pu.type==='health'){
          const gain=Math.min(25,f.maxHp-f.hp);f.hp=Math.min(f.maxHp,f.hp+25);
          dmgNums.push({x:pu.x,y:pu.y-10,val:'+'+gain+'HP',col:'#FF4466',life:1200,age:0});
        }else if(pu.type==='speed'){
          f.speedBoost={mult:1.6,timer:3000};
          dmgNums.push({x:pu.x,y:pu.y-10,val:'SPD!',col:'#44DDFF',life:1200,age:0});
        }else if(pu.type==='damage'){
          f.dmgBoost={bonus:3,timer:3000};
          dmgNums.push({x:pu.x,y:pu.y-10,val:'DMG!',col:'#FFAA00',life:1200,age:0});
        }else if(pu.type==='regen'){
          f.regenBoost={timer:6000};
          dmgNums.push({x:pu.x,y:pu.y-10,val:'RGN!',col:'#44FF88',life:1200,age:0});
        }else if(pu.type==='shield'){
          f.shield=Math.min((f.shield||0)+25,50);
          dmgNums.push({x:pu.x,y:pu.y-10,val:'SHD!',col:'#88CCFF',life:1200,age:0});
        }
        sfxPickup();powerups.splice(i,1);break;
      }
    }
  }

  // Arena atmosphere particles
  if(arenaTheme===1){
    arenaParticles.forEach(p=>{p.y-=p.vy*(dt/16);if(p.y<AY-4){p.y=AY+AH;p.x=AX+Math.random()*AW;}});
  }else if(arenaTheme===3){
    arenaParticles.forEach(p=>{
      if(!p.active){p.cd-=dt;if(p.cd<=0){p.active=true;p.x=AX+Math.random()*AW*0.6;p.y=AY+Math.random()*AH*0.35;const a=Math.PI*0.22;p.vx=Math.cos(a)*5;p.vy=Math.sin(a)*5;p.life=1;p.cd=6000+Math.random()*9000;}}
      else{p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.life=Math.max(0,p.life-dt*0.0025);if(p.life<=0)p.active=false;}
    });
  }else if(arenaTheme===4){
    arenaParticles.forEach(p=>{
      p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);
      if(p.y<AY||p.x<AX||p.x>AX+AW){p.x=AX+10+Math.random()*(AW-20);p.y=AY+AH-5;}
    });
  }else if(arenaTheme===5){
    arenaParticles.forEach(p=>{
      p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.phase+=dt*0.002;
      if(p.y>AY+AH+4||p.x<AX-4||p.x>AX+AW+4){p.x=AX+Math.random()*AW;p.y=AY-4;}
    });
  }

  for(let i=dmgNums.length-1;i>=0;i--){
    dmgNums[i].age+=dt;if(dmgNums[i].age>=dmgNums[i].life)dmgNums.splice(i,1);
  }

  killFeed.forEach(k=>k.age+=dt);killFeed=killFeed.filter(k=>k.age<k.life);
  const stillAlive=fighters.filter(f=>!f.dead);
  if(stillAlive.length<=1){
    if(fighters.length===0){state='select';return;}
    winner=stillAlive.length===1?stillAlive[0]:fighters[fighters.length-1];
    battleDuration=battleTime;addWin(winner.name);state='over';
  }
}

const ORBIT_FLAGS=['healOnHit','knockback','burnOnHit','splash','rageMode','multiHit','executeBonus'];
function applyUpgrade(f,step){
  if(step===0){
    // Unlock pending orbit (with all flags), or expand all orbit radii
    if(f.pendingOrbits&&f.pendingOrbits.length>0){
      f.abilities.push(f.pendingOrbits.shift());
    }else{
      // Widen existing orbits — more coverage, more threat
      f.abilities.filter(a=>a.type==='orbit').forEach(a=>a.rad=Math.min(a.rad+4,72));
    }
  }else if(step===1){
    // Orbit damage up, projectile speed + damage up
    f.abilities.forEach(a=>{
      if(a.type==='orbit'){a.dmg+=1;}
      if(a.type==='projectile'){a.spd*=1.18;a.dmg+=1;}
    });
  }else if(step===2){
    // All damage +2, area abilities get bigger and fire faster
    f.abilities.forEach(a=>{
      a.dmg=(a.dmg||0)+2;
      if(a.type==='area'){a.rad=Math.min(a.rad+8,110);a.rate=Math.max(a.rate-200,600);}
    });
  }else if(step===3){
    // Projectile count +1; duplicate one orbit with ALL flags copied
    f.abilities.forEach(a=>{if(a.type==='projectile')a.cnt++;});
    const oa=f.abilities.filter(a=>a.type==='orbit');
    if(oa.length>0){
      const src=oa[~~(Math.random()*oa.length)];
      const n=mkO(src.sub+'_u',src.dmg,src.rad,src.spd,Math.random()*Math.PI*2,src.sz,src.col);
      ORBIT_FLAGS.forEach(k=>{if(src[k]!==undefined)n[k]=src[k];});
      f.abilities.push(n);
    }
  }
}

      {aIdx:0,bIdx:1,winner:null},{aIdx:2,bIdx:3,winner:null},

      {aIdx:null,bIdx:null,winner:null},
      {aIdx:null,bIdx:null,winner:null},
      {aIdx:null,bIdx:null,winner:null}

    matches=[{aIdx:0,bIdx:1,winner:null},{aIdx:2,bIdx:3,winner:null},{aIdx:null,bIdx:null,winner:null}];
  }
  tournament={fighters:f,matches,matchIdx:0,champion:null};

function startTournamentMatch(){
  const m=tournament.matches[tournament.matchIdx];

  selected=[fa,fb];
  enterPerkDraft();
}

// ─── ENVIRONMENTAL HAZARDS ────────────────────────────────────────────────────
function spawnHazard(){
  switch(arenaTheme){
    case 0:// DUNGEON — spike trap (static zone)
      hazards.push({theme:0,x:AX+70+Math.random()*(AW-140),y:AY+70+Math.random()*(AH-140),
        r:30,age:0,life:5500,dmg:8,col:'#998866',active:false,warnLife:1200,tickTimer:0,tickRate:600});
      break;
    case 1:// VOLCANO — lava eruption (expanding circle)
      hazards.push({theme:1,x:AX+60+Math.random()*(AW-120),y:AY+60+Math.random()*(AH-120),
        r:0,maxR:55,age:0,life:2800,dmg:12,col:'#FF4400',active:false,warnLife:800,tickTimer:0,tickRate:400});
      break;
    case 2:{// CYBER — laser beam (sweeping h or v)
      const axis=Math.random()<0.5?'h':'v';
      const pos=axis==='h'?AY+50+Math.random()*(AH-100):AX+50+Math.random()*(AW-100);
      const vel=(Math.random()<0.5?1:-1)*(50+Math.random()*60);
      hazards.push({theme:2,axis,pos,vel,age:0,life:2000,dmg:14,col:'#00FFCC',active:false,warnLife:600,tickTimer:0,tickRate:80});
      break;}
    case 3:// COSMOS — gravity well (pulls to center, no dmg)
      hazards.push({theme:3,x:AX+AW/2,y:AY+AH/2,r:90,age:0,life:6000,dmg:0,col:'#330066',
        active:true,warnLife:0,tickTimer:0,tickRate:100,pull:0.38});
      break;
    case 4:{// DOJO — collapsing wall (random edge band)
      const edge=~~(Math.random()*4);
      hazards.push({theme:4,edge,age:0,life:4500,dmg:7,col:'#886644',
        active:false,warnLife:1000,tickTimer:0,tickRate:500,depth:32});
      break;}
    case 5:// ICE — frost zone (freezes + minor damage)
      hazards.push({theme:5,x:AX+60+Math.random()*(AW-120),y:AY+60+Math.random()*(AH-120),
        r:42,age:0,life:5500,dmg:2,col:'#88DDFF',active:false,warnLife:1000,tickTimer:0,tickRate:500});
      break;
  }
}
function updateHazards(dt,alive){
  // Spawn gate: first hazard at 30s, then every 20s
  if(battleTime>=30000&&!hazardSpawned){hazardSpawned=true;spawnHazard();}
  if(hazardSpawned){hazardTimer+=dt;if(hazardTimer>=20000){hazardTimer-=20000;spawnHazard();}}
  for(let i=hazards.length-1;i>=0;i--){
    const h=hazards[i];
    h.age+=dt;
    if(!h.active&&h.age>=h.warnLife)h.active=true;
    if(h.age>=h.life){hazards.splice(i,1);continue;}
    if(!h.active)continue;
    // Expand lava
    if(h.theme===1)h.r=Math.min(h.maxR,(h.r||0)+h.maxR*dt/1200);
    // Sweep laser
    if(h.theme===2){
      h.pos+=h.vel*(dt/1000);
      if(h.axis==='h'&&(h.pos<AY+10||h.pos>AY+AH-10))h.vel*=-1;
      if(h.axis==='v'&&(h.pos<AX+10||h.pos>AX+AW-10))h.vel*=-1;
    }
    h.tickTimer+=dt;
    if(h.tickTimer<h.tickRate)continue;
    h.tickTimer-=h.tickRate;
    alive.forEach(f=>{
      let hit=false;
      if(h.theme===0||h.theme===1||h.theme===5){hit=Math.hypot(f.x-h.x,f.y-h.y)<(h.r||30)+f.r;}
      else if(h.theme===2){
        hit=h.axis==='h'?Math.abs(f.y-h.pos)<f.r+8:Math.abs(f.x-h.pos)<f.r+8;
      }else if(h.theme===3){
        // Gravity pull
        const dx=h.x-f.x,dy=h.y-f.y,d=Math.hypot(dx,dy)||1;
        if(d<h.r+f.r){f.vx+=dx/d*h.pull;f.vy+=dy/d*h.pull;}
      }else if(h.theme===4){
        const d=h.depth;
        if(h.edge===0)hit=f.y<AY+d+f.r;
        else if(h.edge===1)hit=f.x>AX+AW-d-f.r;
        else if(h.edge===2)hit=f.y>AY+AH-d-f.r;
        else hit=f.x<AX+d+f.r;
      }
      if(hit&&h.dmg>0)dealDamage(f,h.dmg,h.col);
      if(hit&&h.theme===5){f.freezeTimer=Math.max(f.freezeTimer,800);f.vx*=0.92;f.vy*=0.92;}
    });
  }
}

function pxSprite(key,col){
  PCX.clearRect(0,0,16,16);
  const[r,g,b]=hexRgb(col);
  const L=mkCol(r*1.5,g*1.5,b*1.5),D=mkCol(r*.4,g*.4,b*.4);
  const p=(x,y,w,h,c)=>{PCX.fillStyle=c;PCX.fillRect(x,y,w,h);};
  switch(key){
    case'sword':
      // Blade pointing up: light|mid|dark columns
      p(5,0,1,9,L);p(6,0,1,9,col);p(7,0,1,9,D);p(6,0,1,1,'#FFF');
      // Crossguard
      p(2,9,12,1,L);p(2,10,12,1,D);p(3,9,10,1,col);
      // Grip

function drawOrbitSprite(ctx,sub,ox,oy,sz,col,ang){
  const key=subToKey(sub);
  const s=~~(sz*2);
  // Per-weapon VFX config: [haloRadius, haloAlpha, glowColor(null=col), trailCount, trailSpread]
  const _V={
    sword:    [1.8,0.18,'#FFD060',2,0.20],
    axe:      [2.6,0.30,'#FF5500',2,0.26],
    shuriken: [1.6,0.22,'#AADDFF',3,0.14],
    scythe:   [2.2,0.28,'#CC0044',2,0.24],
    flail:    [2.0,0.22,'#FF8800',2,0.20],
    fist:     [2.4,0.18,'#887766',2,0.22],
    deathorb: [3.2,0.35,null,4,0.16],
    star:     [2.0,0.35,'#FFFFFF',2,0.22],
    miasma:   [2.2,0.22,'#88BB00',2,0.20],
    cap:      [2.0,0.20,null,2,0.20],
    rune:     [2.4,0.28,null,3,0.18],
    voidring: [3.0,0.30,null,3,0.18],
  };
  const [hr,ha,hc,tc,ts]=_V[key]||[1.8,0.16,null,2,0.18];
  const glowCol=hc||col;
  const _om=Math.min(0.13+(battleTime/120000)*1.17,1.3);
  const _ha=ha*Math.min(1.5,0.6+_om);
  // 1. Soft halo circle (additive)
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=_ha;ctx.fillStyle=glowCol;
  ctx.beginPath();ctx.arc(~~ox,~~oy,~~(sz*hr),0,Math.PI*2);ctx.fill();
  // 2. Trailing ghost copies at angular offsets (additive)
  for(let _i=tc;_i>=1;_i--){
    const _ta=ang+Math.PI/2-_i*ts;
    ctx.save();ctx.translate(~~ox,~~oy);ctx.rotate(_ta);
    ctx.globalAlpha=(1-_i/(tc+1))*0.28;
    ctx.imageSmoothingEnabled=false;
    pxSprite(key,glowCol);ctx.drawImage(PIXEL_CANVAS,-s>>1,-s>>1,s,s);
    ctx.restore();
  }
  // 4. Deathorb/voidring: pulsing outer ring (additive)
  if(key==='deathorb'||key==='voidring'){
    const _p=0.5+0.5*Math.sin(battleTime*0.006);
    ctx.globalAlpha=_p*0.5;ctx.strokeStyle=glowCol;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(~~ox,~~oy,~~(sz*2.8),0,Math.PI*2);ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.restore();
  // 3. Shuriken: 4 radial spin lines
  if(key==='shuriken'){
    ctx.globalAlpha=0.38;ctx.strokeStyle=col;ctx.lineWidth=1;ctx.lineCap='round';
    for(let _i=0;_i<4;_i++){const _a=ang+_i*Math.PI/2;
      ctx.beginPath();ctx.moveTo(ox+Math.cos(_a)*sz,oy+Math.sin(_a)*sz);
      ctx.lineTo(ox+Math.cos(_a)*(sz*2.4),oy+Math.sin(_a)*(sz*2.4));ctx.stroke();}
    ctx.globalAlpha=1;
  }
  // 5. Main sprite
  ctx.save();ctx.translate(~~ox,~~oy);ctx.rotate(ang+Math.PI/2);
  ctx.imageSmoothingEnabled=false;
  pxSprite(key,col);ctx.drawImage(PIXEL_CANVAS,-s>>1,-s>>1,s,s);
  ctx.restore();
}

function drawProjectileSprite(ctx,p){
  const key=subToKey(p.sub||'');
  if(p.trail&&p.trail.length>1){
    p.trail.forEach((t,i)=>{
      const _af=i/p.trail.length;
      ctx.globalAlpha=_af*0.45;
      switch(key){
        case'bolt':
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.arc(~~(t.x+(i%2===0?2:-2)),~~(t.y+(i%3===0?2:-1)),~~(p.sz*0.55),0,Math.PI*2);ctx.fill();
          if(i%3===0){ctx.strokeStyle=p.col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(~~t.x,~~t.y);ctx.lineTo(~~(t.x+(Math.random()-0.5)*6),~~(t.y-4));ctx.stroke();}
          break;
        case'drainorb':case'fang':
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.arc(~~t.x,~~(t.y+i*1.2),~~(p.sz*0.65),0,Math.PI*2);ctx.fill();
          break;
        case'comet':case'cannon':case'star':
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.arc(~~t.x,~~t.y,~~(p.sz*0.9),0,Math.PI*2);ctx.fill();
          break;
        default:
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.arc(~~t.x,~~t.y,~~(p.sz*0.62),0,Math.PI*2);ctx.fill();
      }
    });
    ctx.globalAlpha=1;
  }
  pxSprite(key,p.col);
  const s=~~(p.sz*2);
  const vang=Math.atan2(p.vy,p.vx);
  ctx.save();ctx.translate(~~p.x,~~p.y);ctx.rotate(vang);
  ctx.imageSmoothingEnabled=false;
  ctx.shadowBlur=7+p.sz*0.5;ctx.shadowColor=p.col;
  ctx.drawImage(PIXEL_CANVAS,-s>>1,-s>>1,s,s);
  ctx.shadowBlur=0;
  ctx.restore();
}

function _fpoly(ctx,x,y,n,rot,r){ctx.beginPath();for(let i=0;i<n;i++){const a=rot+i/n*Math.PI*2;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();}
function _fstar(ctx,x,y,n,r1,r2,rot){ctx.beginPath();for(let i=0;i<n*2;i++){const a=rot+i/(n*2)*Math.PI*2;const rr=i%2===0?r1:r2;i===0?ctx.moveTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr):ctx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}ctx.closePath();}
function drawFighterBody(ctx,f){
  const x=~~f.x,y=~~f.y,r=f.r,c=f.col,bt=battleTime;

      ctx.strokeStyle='rgba(255,240,150,0.7)';ctx.lineWidth=2;

      ctx.shadowBlur=14;_fpoly(ctx,x,y,6,-Math.PI/6,r);ctx.strokeStyle='#FFF';ctx.lineWidth=1.5;ctx.stroke();break;}
    case 1:{// BERSERKR - spinning jagged 6-point star, dark red
      const ba=bt*0.0015;_fstar(ctx,x,y,6,r,r*0.55,ba);ctx.fillStyle=c;ctx.fill();
      ctx.fillStyle='#220000';ctx.beginPath();ctx.arc(x,y,r*0.3,0,Math.PI*2);ctx.fill();

// ─── DRAW ─────────────────────────────────────────────────────────────────────

function draw(now){
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#000';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.save();
  if(shakeTimer>0){shakeTimer=Math.max(0,shakeTimer-16);shakeAmt*=0.88;if(shakeTimer<=0)shakeAmt=0;ctx.translate(~~((Math.random()-0.5)*shakeAmt),~~((Math.random()-0.5)*shakeAmt));}
  if(state==='title')drawTitle(now);
  else if(state==='select')drawSelect();
  else if(state==='battle')drawBattle(now);
  else if(state==='over')drawOver(now);
  else if(state==='leaderboard')drawLeaderboard();
  else if(state==='info')drawInfo();
  else if(state==='perkdraft')drawPerkDraft();
  else if(state==='bracket')drawBracket();
  ctx.restore();
}

function drawTitle(now){
  // 1 ── Deep background gradient
  const bg=ctx.createRadialGradient(400,330,60,400,330,520);
  bg.addColorStop(0,'#0d0022');bg.addColorStop(0.6,'#050011');bg.addColorStop(1,'#000000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,800,660);

  // 2 ── Stars (tinted blue-white, larger when bright)
  stars.forEach(s=>{
    const br=~~(s.b*220+35),sz=s.b>0.7?2:1;
    ctx.fillStyle=`rgb(${br},${~~(br*0.85)},${Math.min(255,~~(br*1.2))})`;
    ctx.fillRect(~~s.x,~~s.y,sz,sz);
  });

  // 3 ── Ember sparks
  titleSparks.forEach(s=>{
    ctx.globalAlpha=s.life*0.8;ctx.shadowColor=s.col;ctx.shadowBlur=6;ctx.fillStyle=s.col;
    ctx.beginPath();ctx.arc(~~s.x,~~s.y,s.sz,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // 4 ── Orbiting orbs with trails
  titleOrbs.forEach(o=>{
    o.trail.forEach((t,i)=>{
      ctx.globalAlpha=(i/o.trail.length)*0.25;ctx.fillStyle=o.col;
      ctx.beginPath();ctx.arc(~~t.x,~~t.y,o.r-1,0,Math.PI*2);ctx.fill();
    });
    const ox=400+Math.cos(o.ang)*110,oy=360+Math.sin(o.ang)*110;
    ctx.globalAlpha=1;ctx.shadowColor=o.col;ctx.shadowBlur=14;ctx.fillStyle=o.col;
    ctx.beginPath();ctx.arc(~~ox,~~oy,o.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  // 5 ── CRT scanlines
  ctx.fillStyle='rgba(0,0,0,0.055)';
  for(let y=0;y<660;y+=4)ctx.fillRect(0,y,800,1);

  // 6 ── Corner L-brackets
  const _cb=24,_cc='#5533AA';ctx.strokeStyle=_cc;ctx.lineWidth=1.5;
  [[0,0,1,1],[800,0,-1,1],[0,660,1,-1],[800,660,-1,-1]].forEach(([cx,cy,sx,sy])=>{
    ctx.beginPath();ctx.moveTo(cx+sx*_cb,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*_cb);ctx.stroke();
  });

  // 7 ── Title glow
  const _pulse=Math.sin(titlePulse*0.0018);
  const _r=255,_g=~~(136+_pulse*60),_b=255;
  const _titleCol=`rgb(${_r},${_g},${_b})`;
  ctx.font='bold 52px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor=_titleCol;ctx.shadowBlur=28+_pulse*12;
  ctx.fillStyle=`rgba(${_r},${_g},${_b},0.18)`;ctx.fillText('BATTLE ARENA',400,60);
  ctx.shadowBlur=16;ctx.fillStyle=_titleCol;ctx.fillText('BATTLE ARENA',400,60);
  ctx.shadowBlur=0;

  // 8 ── Subtitle
  ctx.font='11px "Courier New",monospace';ctx.fillStyle='#AA99CC';
  ctx.fillText('\u25c8 25 ETERNAL CHAMPIONS \u25c8',400,122);

  // 9 ── All 5 category chips
  const chips=[
    {text:'\u2694 WEAPONS',col:'#FFD700'},{text:'\u2726 MAGIC',col:'#CC88FF'},
    {text:'\u2726 NATURE',col:'#44FF88'},{text:'\u2666 CURSED',col:'#FF6644'},
    {text:'\u2605 ELDRITCH',col:'#88FFCC'}
  ];
  ctx.font='bold 11px "Courier New",monospace';
  const _cw=128,_cg=7;
  let chipX=400-(chips.length*_cw+(chips.length-1)*_cg)/2;
  chips.forEach(chip=>{
    ctx.fillStyle='#0a0018';ctx.strokeStyle=chip.col;ctx.lineWidth=1;
    ctx.shadowColor=chip.col;ctx.shadowBlur=6;
    ctx.fillRect(~~chipX,140,_cw,22);ctx.strokeRect(~~chipX+0.5,140.5,_cw-1,21);
    ctx.shadowBlur=0;ctx.fillStyle=chip.col;ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(chip.text,~~chipX+_cw/2,146);
    chipX+=_cw+_cg;
  });

  // 10 ── Pulsing CLICK TO PLAY box

function drawCharTooltip(def,ax,ay){
  const d=DESCS[def.name];if(!d)return;
  const lore=d.lore;
  const uParts=d.unique.split('\u2014');
  const uKey=(uParts[0]||'').trim();
  const uDesc=(uParts[1]||'').trim();
  const boxW=244,pad=8,inner=boxW-pad*2,lineH=13;
  // Word-wrap lore text
  ctx.font='10px "Courier New",monospace';
  const loreLines=[];let cur='';
  lore.split(' ').forEach(w=>{
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width<=inner){cur=test;}
    else{if(cur)loreLines.push(cur);cur=w;}
  });
  if(cur)loreLines.push(cur);
  const hp=def.maxHp||100;
  const boxH=pad+loreLines.length*lineH+5+lineH+lineH+lineH+pad;
  const tx=Math.min(ax,CANVAS_W-boxW-4);
  const ty=Math.max(4,Math.min(ay,CANVAS_H-boxH-4));
  ctx.fillStyle='#0f0f0f';ctx.strokeStyle=def.col;ctx.lineWidth=1;
  ctx.fillRect(tx,ty,boxW,boxH);ctx.strokeRect(tx+0.5,ty+0.5,boxW-1,boxH-1);
  // Mini fighter preview
  ctx.save();
  drawFighterBody(ctx,{x:tx+boxW-24,y:ty+24,r:18,col:def.col,id:def.id,charge:0,maxCharge:0});
  ctx.restore();
  ctx.font='10px "Courier New",monospace';ctx.fillStyle='#CCC';ctx.textAlign='left';ctx.textBaseline='top';
  loreLines.forEach((line,i)=>ctx.fillText(line,tx+pad,ty+pad+i*lineH));
  const afterLore=ty+pad+loreLines.length*lineH+5;
  // HP stat
  ctx.font='bold 10px "Courier New",monospace';
  ctx.fillStyle=hp>100?'#88FF88':hp<100?'#FF8888':'#888888';
  ctx.fillText('HP: '+hp+(hp>100?' ▲':hp<100?' ▼':''),tx+pad,afterLore);
  ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle=def.col;
  ctx.fillText('UNIQUE: '+uKey,tx+pad,afterLore+lineH);
  ctx.font='10px "Courier New",monospace';ctx.fillStyle='#AAA';
  ctx.fillText(uDesc,tx+pad,afterLore+lineH*2);
}

function applySynergies(fighters){
  const cats={};selected.forEach(d=>{cats[d.cat]=(cats[d.cat]||0)+1;});
  Object.entries(cats).forEach(([cat,count])=>{
    const syn=SYNERGIES[cat];if(!syn)return;
    syn.tiers.forEach(tier=>{if(count>=tier.req)fighters.filter(f=>f.cat===cat).forEach(tier.apply);});
  });
}

    const count=cats[cat]||0,ry=PY+20+si*PH;
    const activeTier=syn.tiers.slice().reverse().find(t=>count>=t.req);
    const nextTier=syn.tiers.find(t=>count<t.req);
    const isActive=!!activeTier;
    if(isActive){ctx.fillStyle=syn.col+'11';ctx.fillRect(PX,ry,PW,PH-4);}
    ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle=isActive?syn.col:'#443355';
    ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(syn.icon+' '+syn.name,PX+6,ry+6);
    const maxPips=5;
    for(let p=0;p<maxPips;p++){
      ctx.fillStyle=p<count?syn.col:'#221133';
      ctx.shadowBlur=p<count&&isActive?6:0;ctx.shadowColor=syn.col;
      ctx.beginPath();ctx.arc(PX+140+p*18,ry+14,5,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    if(activeTier){
      ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle=syn.col;
      ctx.textAlign='left';ctx.fillText('\u2713 '+activeTier.desc,PX+240,ry+6);
      if(syn.tiers.length>1&&count>=syn.tiers[1].req){ctx.fillStyle=syn.col+'CC';ctx.fillText('\u2713 '+syn.tiers[1].desc,PX+240,ry+20);}
    }else if(nextTier){
      ctx.font='9px "Courier New",monospace';ctx.fillStyle='#332244';ctx.textAlign='left';
      ctx.fillText((nextTier.req-count)+' more \u2192 '+nextTier.desc,PX+240,ry+6);
    }
    const prog=Math.min(count/5,1);
    ctx.fillStyle='#150020';ctx.fillRect(PX+138,ry+24,maxPips*18+2,4);
    ctx.fillStyle=isActive?syn.col:syn.col+'44';ctx.fillRect(PX+138,ry+24,~~((maxPips*18+2)*prog),4);
  });
}

function drawCloud(ctx,cl){
  const t=cl.age/cl.life,alpha=(1-t)*0.42;
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=cl.col;ctx.strokeStyle=cl.col;
  const cx=~~cl.x,cy=~~cl.y,r=cl.r,rot=cl.age*0.0008;
  switch(cl.sub){
    case'divine':{
      // 8 rotating radial spokes (holy light rays)
      ctx.lineWidth=3;ctx.lineCap='round';
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2+rot;
        ctx.globalAlpha=alpha*(0.5+0.5*Math.abs(Math.sin(a*2+cl.age*0.003)));
        ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*0.2,cy+Math.sin(a)*r*0.2);
        ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke();
        // Sparkle tip
        ctx.globalAlpha=alpha*0.9;
        ctx.beginPath();ctx.arc(~~(cx+Math.cos(a)*r*0.95),~~(cy+Math.sin(a)*r*0.95),3,0,Math.PI*2);ctx.fill();
      }
      // Central glow
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.22),0,Math.PI*2);ctx.fill();
      break;
    }
    case'slam':{
      // Ground cracks radiating from dark center
      ctx.lineWidth=2;ctx.lineCap='butt';
      for(let j=0;j<6;j++){
        const a=j/6*Math.PI*2+0.4;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke();
        // Sub-cracks at 60%
        const mx=cx+Math.cos(a)*r*0.6,my=cy+Math.sin(a)*r*0.6;
        ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx+Math.cos(a+0.5)*r*0.38,my+Math.sin(a+0.5)*r*0.38);ctx.stroke();
        ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx+Math.cos(a-0.5)*r*0.38,my+Math.sin(a-0.5)*r*0.38);ctx.stroke();
      }
      // Dark center crater
      ctx.globalAlpha=alpha*1.4;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.16),0,Math.PI*2);ctx.fill();
      break;
    }
    case'deathwave':{
      // Dark filled base + 7 upward wisps
      ctx.globalAlpha=alpha*0.55;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.7),0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=alpha;
      for(let j=0;j<7;j++){
        const a=-Math.PI/2+(j-3)*0.38+Math.sin(cl.age*0.002+j)*0.1;
        const wr=r*(0.55+0.35*((j%3)/3));
        ctx.beginPath();ctx.arc(~~(cx+Math.cos(a)*wr*0.45),~~(cy+Math.sin(a)*wr*0.45-wr*0.15),~~(r*0.11),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(~~(cx+Math.cos(a)*wr*0.7),~~(cy+Math.sin(a)*wr*0.7-wr*0.25),~~(r*0.08),0,Math.PI*2);ctx.fill();
      }
      break;
    }
    case'shockwave':{
      // Electric arc zigzag lines radiating out
      ctx.lineWidth=1.5;ctx.lineCap='round';
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2+rot*2;
        ctx.beginPath();
        let px=cx,py=cy;
        for(let k=1;k<=5;k++){
          const d=r*k/5,jag=(k%2===0?1:-1)*r*0.12;
          const perp=a+Math.PI/2;
          px=cx+Math.cos(a)*d+Math.cos(perp)*jag;
          py=cy+Math.sin(a)*d+Math.sin(perp)*jag;
          k===1?ctx.moveTo(~~px,~~py):ctx.lineTo(~~px,~~py);
        }
        ctx.stroke();
      }
      // Center spark
      ctx.globalAlpha=alpha*1.2;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.12),0,Math.PI*2);ctx.fill();
      break;
    }
    case'freeze':{
      // 6 hexagonal ice crystal spikes
      ctx.lineWidth=2;ctx.lineCap='round';
      for(let j=0;j<6;j++){
        const a=j/6*Math.PI*2;
        // Main spike
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(~~(cx+Math.cos(a)*r),~~(cy+Math.sin(a)*r));ctx.stroke();
        // Side branches at 50% and 75%
        for(const frac of[0.5,0.75]){
          const bx=cx+Math.cos(a)*r*frac,by=cy+Math.sin(a)*r*frac;
          ctx.beginPath();ctx.moveTo(~~(bx+Math.cos(a+Math.PI/3)*r*0.2),~~(by+Math.sin(a+Math.PI/3)*r*0.2));
          ctx.lineTo(~~bx,~~by);
          ctx.lineTo(~~(bx+Math.cos(a-Math.PI/3)*r*0.2),~~(by+Math.sin(a-Math.PI/3)*r*0.2));
          ctx.stroke();
        }
        // Crystal tip dot
        ctx.beginPath();ctx.arc(~~(cx+Math.cos(a)*r),~~(cy+Math.sin(a)*r),2,0,Math.PI*2);ctx.fill();
      }
      // Inner hex outline
      ctx.globalAlpha=alpha*0.6;ctx.lineWidth=1;
      ctx.beginPath();
      for(let j=0;j<6;j++){const a=j/6*Math.PI*2;j===0?ctx.moveTo(~~(cx+Math.cos(a)*r*0.35),~~(cy+Math.sin(a)*r*0.35)):ctx.lineTo(~~(cx+Math.cos(a)*r*0.35),~~(cy+Math.sin(a)*r*0.35));}
      ctx.closePath();ctx.stroke();
      break;
    }
    case'drainwave':{
      // 8 inward-curving tendrils (drain vortex)
      ctx.lineWidth=2;ctx.lineCap='round';
      for(let j=0;j<8;j++){
        const a0=j/8*Math.PI*2-rot*3;
        ctx.beginPath();
        for(let k=0;k<=10;k++){
          const frac=k/10,dist=r*(1-frac);
          const ang=a0+frac*0.9;
          const px=cx+Math.cos(ang)*dist,py=cy+Math.sin(ang)*dist;
          k===0?ctx.moveTo(~~px,~~py):ctx.lineTo(~~px,~~py);
        }
        ctx.stroke();
      }
      // Dark center vortex
      ctx.globalAlpha=alpha*0.8;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.18),0,Math.PI*2);ctx.fill();
      break;
    }
    case'darkpulse':{
      // 5 spiral arms
      ctx.lineWidth=2.5;ctx.lineCap='round';
      for(let j=0;j<5;j++){
        const baseA=j/5*Math.PI*2+rot*1.5;
        ctx.beginPath();
        for(let k=0;k<=16;k++){
          const frac=k/16,dist=r*frac;
          const ang=baseA+frac*1.4;
          const px=cx+Math.cos(ang)*dist,py=cy+Math.sin(ang)*dist;
          k===0?ctx.moveTo(~~px,~~py):ctx.lineTo(~~px,~~py);
        }
        ctx.stroke();
      }
      // Void center
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.15),0,Math.PI*2);ctx.fill();
      break;
    }
    case'runicblast':{
      // 6 diamond rune shapes arranged in ring
      for(let j=0;j<6;j++){
        const a=j/6*Math.PI*2+rot;
        const rx=cx+Math.cos(a)*r*0.62,ry2=cy+Math.sin(a)*r*0.62;
        const ds=r*0.14;
        ctx.beginPath();ctx.moveTo(~~rx,~~(ry2-ds));ctx.lineTo(~~(rx+ds),~~ry2);
        ctx.lineTo(~~rx,~~(ry2+ds));ctx.lineTo(~~(rx-ds),~~ry2);ctx.closePath();ctx.fill();
      }
      // Rune ring
      ctx.globalAlpha=alpha*0.6;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.62),0,Math.PI*2);ctx.stroke();
      // Center rune
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.moveTo(cx,cy-~~(r*0.18));ctx.lineTo(cx+~~(r*0.18),cy+~~(r*0.1));
      ctx.lineTo(cx-~~(r*0.18),cy+~~(r*0.1));ctx.closePath();ctx.fill();
      break;
    }
    case'slowfield':{
      // Concentric ripple rings only — no fill, + 12 clock tick marks
      ctx.lineWidth=1.5;
      for(let ring=1;ring<=3;ring++){
        ctx.globalAlpha=alpha*(1-ring*0.22);
        ctx.beginPath();ctx.arc(cx,cy,~~(r*ring/3.2),0,Math.PI*2);ctx.stroke();
      }
      ctx.globalAlpha=alpha;ctx.lineWidth=1;
      for(let j=0;j<12;j++){
        const a=j/12*Math.PI*2;
        const inner=r*0.82,outer=r*0.96+(j%3===0?r*0.04:0);
        ctx.beginPath();ctx.moveTo(~~(cx+Math.cos(a)*inner),~~(cy+Math.sin(a)*inner));
        ctx.lineTo(~~(cx+Math.cos(a)*outer),~~(cy+Math.sin(a)*outer));ctx.stroke();
      }
      break;
    }
    case'poison':{
      // Rising bubble clusters
      for(let j=0;j<12;j++){
        const seed=j*137.5,bx=cx+Math.cos(seed)*r*(0.2+0.65*(j%4)/3);
        const by=cy+Math.sin(seed*0.7)*r*(0.15+0.7*(j%3)/2)-Math.sin(cl.age*0.002+j)*r*0.06;
        const br=r*(0.07+0.08*(j%3)/2);
        ctx.globalAlpha=alpha*(0.5+0.5*(j%2));
        ctx.beginPath();ctx.arc(~~bx,~~by,~~br,0,Math.PI*2);ctx.fill();
        // Bubble highlight
        ctx.globalAlpha=alpha*0.4;ctx.fillStyle='#FFF';
        ctx.beginPath();ctx.arc(~~(bx-br*0.3),~~(by-br*0.3),~~(br*0.3),0,Math.PI*2);ctx.fill();
        ctx.fillStyle=cl.col;
      }
      break;
    }
    case'cloud':{
      // Dense overlapping murky blob cluster
      for(let j=0;j<10;j++){
        const seed=j*93.7,bx=cx+Math.cos(seed)*r*(0.15+0.7*((j*7%10)/10));
        const by=cy+Math.sin(seed*1.3)*r*(0.1+0.6*((j*3%7)/7));
        const br=r*(0.35+0.2*(j%3)/2);
        ctx.globalAlpha=alpha*(0.45+0.15*(j%3));
        ctx.beginPath();ctx.arc(~~bx,~~by,~~br,0,Math.PI*2);ctx.fill();
      }
      break;
    }
    case'spore':{
      // Dot grid pattern
      const step=r*0.28;
      for(let di=-3;di<=3;di++)for(let dj=-3;dj<=3;dj++){
        const dx=di*step,dy=dj*step;
        if(Math.hypot(dx,dy)>r*0.9)continue;
        ctx.globalAlpha=alpha*(0.4+0.4*Math.abs(Math.sin(di*dj+cl.age*0.003)));
        ctx.beginPath();ctx.arc(~~(cx+dx),~~(cy+dy),2,0,Math.PI*2);ctx.fill();
      }
      // 4 tiny mushroom cap arcs
      ctx.lineWidth=2;ctx.globalAlpha=alpha;
      for(let j=0;j<4;j++){
        const a=j/4*Math.PI*2+rot;
        const mx=cx+Math.cos(a)*r*0.55,my=cy+Math.sin(a)*r*0.55;
        ctx.beginPath();ctx.arc(~~mx,~~my,~~(r*0.13),Math.PI,0);ctx.fill();
        // Stem
        ctx.beginPath();ctx.moveTo(~~mx,~~my);ctx.lineTo(~~mx,~~(my+r*0.12));ctx.stroke();
      }
      break;
    }
    case'bog':{
      // Irregular flat murky patches
      for(let j=0;j<7;j++){
        const seed=j*71.3,bx=cx+Math.cos(seed)*r*(0.1+0.65*((j*5%9)/9));
        const by=cy+Math.sin(seed*0.8)*r*(0.05+0.5*((j*4%7)/7));
        ctx.globalAlpha=alpha*(0.3+0.25*(j%3));
        ctx.save();ctx.translate(~~bx,~~by);ctx.scale(1.6,0.55);
        ctx.beginPath();ctx.arc(0,0,~~(r*0.28),0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
      // Ripple ring
      ctx.globalAlpha=alpha*0.5;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.65),0,Math.PI*2);ctx.stroke();
      break;
    }
    case'mycelium':{
      // Web strand network connecting 8 ring points
      const pts=Array.from({length:8},(_,j)=>[
        cx+Math.cos(j/8*Math.PI*2)*r*0.9,
        cy+Math.sin(j/8*Math.PI*2)*r*0.9
      ]);
      ctx.lineWidth=1;
      for(let a=0;a<pts.length;a++)for(let b=a+1;b<pts.length;b++){
        if(Math.abs(a-b)>3)continue;
        ctx.globalAlpha=alpha*(0.3+0.3*(1-Math.abs(a-b)/4));
        ctx.beginPath();ctx.moveTo(~~pts[a][0],~~pts[a][1]);
        // Curve through center slightly
        const mx2=(pts[a][0]+pts[b][0])/2,my2=(pts[a][1]+pts[b][1])/2;
        const pull=0.25;
        ctx.quadraticCurveTo(~~(mx2*(1-pull)+cx*pull),~~(my2*(1-pull)+cy*pull),~~pts[b][0],~~pts[b][1]);
        ctx.stroke();
      }
      // Node dots
      ctx.globalAlpha=alpha;
      pts.forEach(([px,py])=>{ctx.beginPath();ctx.arc(~~px,~~py,3,0,Math.PI*2);ctx.fill();});
      ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
      break;
    }
    case'hexwave':{
      // Rotating hexagonal rune grid
      const _hRot=rot*1.2;
      ctx.lineWidth=1.5;
      // Outer hex
      ctx.globalAlpha=alpha*0.8;ctx.strokeStyle=cl.col;
      ctx.beginPath();
      for(let j=0;j<6;j++){const a=_hRot+j/6*Math.PI*2;j===0?ctx.moveTo(~~(cx+Math.cos(a)*r),~~(cy+Math.sin(a)*r)):ctx.lineTo(~~(cx+Math.cos(a)*r),~~(cy+Math.sin(a)*r));}
      ctx.closePath();ctx.stroke();
      // Inner counter-rotating hex
      ctx.globalAlpha=alpha*0.45;
      ctx.beginPath();
      for(let j=0;j<6;j++){const a=-_hRot*1.5+j/6*Math.PI*2;j===0?ctx.moveTo(~~(cx+Math.cos(a)*r*0.5),~~(cy+Math.sin(a)*r*0.5)):ctx.lineTo(~~(cx+Math.cos(a)*r*0.5),~~(cy+Math.sin(a)*r*0.5));}
      ctx.closePath();ctx.stroke();
      // Connecting spokes corner-to-corner
      ctx.globalAlpha=alpha*0.25;ctx.lineWidth=0.8;
      for(let j=0;j<6;j++){
        const a=_hRot+j/6*Math.PI*2;
        ctx.beginPath();ctx.moveTo(~~(cx+Math.cos(a)*r*0.5),~~(cy+Math.sin(a)*r*0.5));ctx.lineTo(~~(cx+Math.cos(a)*r),~~(cy+Math.sin(a)*r));ctx.stroke();
      }
      // Orbiting ✦ rune glyphs
      ctx.globalAlpha=alpha*0.85;ctx.fillStyle=cl.col;ctx.font=`bold ${~~(7+alpha*5)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      for(let j=0;j<6;j++){
        const a=_hRot+j/6*Math.PI*2;
        ctx.globalAlpha=alpha*(0.5+0.5*Math.abs(Math.sin(cl.age*0.003+j)));
        ctx.fillText('\u2736',~~(cx+Math.cos(a)*r*1.08),~~(cy+Math.sin(a)*r*1.08));
      }
      // Center glow dot
      ctx.globalAlpha=alpha*0.6;ctx.fillStyle=cl.col;ctx.beginPath();ctx.arc(cx,cy,~~(r*0.1),0,Math.PI*2);ctx.fill();
      break;
    }
    case'sacrifice':{
      // Scorched ground: charred center + jagged cracks + drifting embers
      ctx.globalAlpha=alpha*0.65;ctx.fillStyle='#220000';
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.55),0,Math.PI*2);ctx.fill();
      // Jagged crack lines
      ctx.lineWidth=1.5;ctx.lineCap='butt';
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2+0.2;
        const long=j%2===0;
        ctx.strokeStyle=long?'#CC2200':'#882200';
        ctx.globalAlpha=alpha*(long?0.85:0.5);
        ctx.beginPath();ctx.moveTo(cx,cy);
        // Jagged path with 3 segments
        let px=cx,py=cy;
        for(let k=1;k<=3;k++){
          const frac=k/3,jag=(k%2===0?1:-1)*r*0.1;
          const perp=a+Math.PI/2;
          px=cx+Math.cos(a)*r*(long?frac:frac*0.6)+Math.cos(perp)*jag;
          py=cy+Math.sin(a)*r*(long?frac:frac*0.6)+Math.sin(perp)*jag;
          ctx.lineTo(~~px,~~py);
        }
        ctx.stroke();
      }
      // Drifting embers (tiny dots rising)
      for(let j=0;j<14;j++){
        const seed=j*53.7;
        const ex=cx+Math.cos(seed)*r*(0.1+0.7*((j*7%10)/10));
        const ey=cy+Math.sin(seed*0.6)*r*(0.1+0.5*((j*3%7)/7))-(cl.age*0.015*(0.5+(j%3)*0.3))%r;
        const er=1+j%3;
        ctx.globalAlpha=alpha*(0.3+0.5*((j%3)/2));
        ctx.fillStyle=j%2===0?'#FF6600':'#FFAA00';
        ctx.beginPath();ctx.arc(~~ex,~~ey,er,0,Math.PI*2);ctx.fill();
      }
      break;
    }
    case'shimmer':{
      // Prismatic rotating arc shards
      const _sRot=rot*0.8;
      const _hues=['#FF88CC','#FF4488','#88FFEE','#44DDFF','#FFEE44','#FFAA00','#BB88FF','#7744FF','#88FFB0','#44FF88','#FFCCAA','#FFE0CC'];
      // 12 arc shards at different angles and radii
      for(let j=0;j<12;j++){
        const a=_sRot+j/12*Math.PI*2;
        const arcR=r*(0.55+0.4*((j%3)/2));
        const arcSpan=Math.PI*(0.25+0.2*(j%4)/3);
        ctx.globalAlpha=alpha*(0.35+0.35*Math.abs(Math.sin(cl.age*0.004+j)));
        ctx.strokeStyle=_hues[j];ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(cx,cy,~~arcR,a,a+arcSpan);ctx.stroke();
      }
      // Inner bright ring
      ctx.globalAlpha=alpha*0.5;ctx.strokeStyle='#FFFFFF';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.25),0,Math.PI*2);ctx.stroke();
      // Sparkle dots at arc tips
      for(let j=0;j<6;j++){
        const a=_sRot*2+j/6*Math.PI*2;
        ctx.globalAlpha=alpha*Math.abs(Math.sin(cl.age*0.006+j*1.1));
        ctx.fillStyle=_hues[j*2];
        ctx.beginPath();ctx.arc(~~(cx+Math.cos(a)*r*0.9),~~(cy+Math.sin(a)*r*0.9),2,0,Math.PI*2);ctx.fill();
      }
      break;
    }
    case'naturepulse':{
      // 8 elliptical leaf/petal shapes pointing outward
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2+rot*0.5;
        const lx=cx+Math.cos(a)*r*0.55,ly=cy+Math.sin(a)*r*0.55;
        ctx.save();ctx.translate(~~lx,~~ly);ctx.rotate(a);
        ctx.globalAlpha=alpha*(0.55+0.3*(j%2));
        ctx.beginPath();ctx.ellipse(0,0,~~(r*0.12),~~(r*0.25),0,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
      // Central bud
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(cx,cy,~~(r*0.14),0,Math.PI*2);ctx.fill();
      break;
    }
    default:{
      // Fallback: original blob render
      ctx.beginPath();ctx.arc(cx,cy,~~r,0,Math.PI*2);ctx.fill();
      for(let j=0;j<6;j++){
        const bx2=cx+Math.cos(j/6*Math.PI*2)*r*0.55,by2=cy+Math.sin(j/6*Math.PI*2)*r*0.55;
        ctx.beginPath();ctx.arc(~~bx2,~~by2,~~(r*0.45),0,Math.PI*2);ctx.fill();
      }
    }
  }
  // Exploding cloud warning pulse in last 20% of life
  if(cl.explodeOnExpiry&&t>0.8){
    ctx.globalAlpha=alpha*(1+Math.sin(cl.age*0.03))*0.5;
    ctx.fillStyle=cl.col;
    ctx.beginPath();ctx.arc(cx,cy,~~r,0,Math.PI*2);ctx.fill();
  }
  // Healing cloud inner glow
  if(cl.healArea){
    ctx.globalAlpha=alpha*0.35*(0.7+0.3*Math.sin(cl.age*0.005));
    ctx.fillStyle='#FFFFFF';
    ctx.beginPath();ctx.arc(cx,cy,~~(r*0.22),0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
